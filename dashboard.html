<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MuffetBot — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=VT323&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --purple:#9147ff;--purple-dim:rgba(145,71,255,0.15);--purple-border:rgba(145,71,255,0.25);
  --purple-light:#b388ff;--pink:#e05a7a;--green:#40d090;--yellow:#f0c060;
  --bg:#0d0d0f;--bg2:#141416;--bg3:#1a1a1e;--bg4:#0f0f12;
  --text:#e8e8f0;--text-dim:#6b6b80;--text-muted:#3a3a4a;
  --sans:'Inter',sans-serif;--display:'VT323',monospace;
  --radius:10px;--radius-sm:6px;
}
html,body{width:100%;min-height:100%;background:var(--bg);font-family:var(--sans);color:var(--text);}

/* ── SIDEBAR ── */
.sidebar{
  position:fixed;top:0;left:0;width:240px;height:100vh;
  background:var(--bg2);border-right:1px solid rgba(255,255,255,0.06);
  display:flex;flex-direction:column;z-index:100;overflow-y:auto;
}
.sidebar-logo{
  padding:20px 20px 16px;border-bottom:1px solid rgba(255,255,255,0.06);
  display:flex;align-items:center;gap:12px;
}
.sidebar-logo img{width:32px;height:32px;image-rendering:pixelated;filter:drop-shadow(0 0 8px rgba(145,71,255,0.5));}
.logo-text{font-size:15px;font-weight:600;color:var(--text);letter-spacing:-0.3px;}
.logo-badge{font-size:10px;color:var(--purple);font-weight:500;}

.user-card{
  padding:12px 20px;border-bottom:1px solid rgba(255,255,255,0.06);
  display:flex;align-items:center;gap:10px;
}
.user-avatar{width:32px;height:32px;border-radius:50%;border:2px solid var(--purple-border);}
.user-name{font-size:13px;font-weight:500;color:var(--text);}
.user-plan{font-size:11px;color:var(--text-dim);margin-top:1px;}

.nav{flex:1;padding:8px 12px;}
.nav-section{font-size:10px;font-weight:500;letter-spacing:1px;color:var(--text-muted);padding:12px 8px 4px;text-transform:uppercase;}
.nav-item{
  display:flex;align-items:center;gap:10px;
  padding:9px 10px;cursor:pointer;border-radius:var(--radius-sm);
  font-size:13px;font-weight:400;color:var(--text-dim);
  transition:all 0.15s;margin-bottom:1px;
}
.nav-item:hover{background:rgba(255,255,255,0.05);color:var(--text);}
.nav-item.active{background:var(--purple-dim);color:var(--purple-light);font-weight:500;}
.nav-icon{font-size:15px;width:20px;text-align:center;flex-shrink:0;}

.sidebar-footer{padding:12px;border-top:1px solid rgba(255,255,255,0.06);}
.btn-logout{
  width:100%;padding:9px;background:transparent;border-radius:var(--radius-sm);
  border:1px solid rgba(255,255,255,0.08);color:var(--text-dim);
  font-family:var(--sans);font-size:13px;cursor:pointer;transition:all 0.15s;
}
.btn-logout:hover{border-color:var(--pink);color:var(--pink);}

/* ── MAIN ── */
.main{margin-left:240px;min-height:100vh;padding:32px;}
.section{display:none;}
.section.active{display:block;}

/* ── PAGE HEADER ── */
.page-header{margin-bottom:28px;}
.page-title{font-size:22px;font-weight:600;color:var(--text);letter-spacing:-0.3px;}
.page-subtitle{font-size:13px;color:var(--text-dim);margin-top:4px;}

/* ── CARDS STATS ── */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px;}
.stat-card{background:var(--bg2);border:1px solid rgba(255,255,255,0.06);border-radius:var(--radius);padding:16px 20px;}
.stat-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.stat-label{font-size:12px;font-weight:500;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.5px;}
.stat-icon{font-size:16px;}
.stat-value{font-size:26px;font-weight:600;color:var(--text);letter-spacing:-0.5px;}
.stat-value.on{color:var(--green);}
.stat-value.off{color:var(--text-dim);}

/* ── PANELS ── */
.panel{background:var(--bg2);border:1px solid rgba(255,255,255,0.06);border-radius:var(--radius);margin-bottom:16px;overflow:hidden;}
.panel-header{padding:14px 20px;border-bottom:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:space-between;}
.panel-title-text{font-size:13px;font-weight:600;color:var(--text);}
.panel-body{padding:20px;}

/* ── TOGGLE ── */
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid rgba(255,255,255,0.04);}
.toggle-row:last-child{border-bottom:none;padding-bottom:0;}
.toggle-row:first-child{padding-top:0;}
.toggle-label{font-size:14px;color:var(--text);font-weight:500;}
.toggle-desc{font-size:12px;color:var(--text-dim);margin-top:3px;}
.toggle{position:relative;width:40px;height:22px;flex-shrink:0;}
.toggle input{opacity:0;width:0;height:0;}
.toggle-slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:#2a2a35;transition:.2s;border-radius:11px;}
.toggle-slider:before{content:"";position:absolute;height:16px;width:16px;left:3px;bottom:3px;background:var(--text-dim);transition:.2s;border-radius:50%;}
input:checked+.toggle-slider{background:var(--purple);}
input:checked+.toggle-slider:before{transform:translateX(18px);background:white;}

/* ── FORMS ── */
.form-group{margin-bottom:16px;}
.form-label{display:block;font-size:12px;font-weight:500;color:var(--text-dim);letter-spacing:0.5px;text-transform:uppercase;margin-bottom:6px;}
.form-input,.form-textarea{
  width:100%;background:var(--bg3);border:1px solid rgba(255,255,255,0.08);border-radius:var(--radius-sm);
  color:var(--text);font-family:var(--sans);font-size:13px;padding:10px 14px;outline:none;transition:border-color .2s;
}
.form-input:focus,.form-textarea:focus{border-color:var(--purple);}
.form-input:disabled{opacity:0.5;cursor:default;}
.form-textarea{resize:vertical;min-height:120px;line-height:1.5;}

/* ── BUTTONS ── */
.btn{font-family:var(--sans);font-size:13px;font-weight:500;padding:9px 18px;border:none;border-radius:var(--radius-sm);cursor:pointer;transition:all 0.15s;}
.btn-primary{background:var(--purple);color:white;}
.btn-primary:hover{background:#7d2ff7;}
.btn-danger{background:transparent;color:var(--pink);border:1px solid rgba(224,90,122,0.3);}
.btn-danger:hover{background:rgba(224,90,122,0.1);}
.btn-success{background:transparent;color:var(--green);border:1px solid rgba(64,208,144,0.3);}
.btn-success:hover{background:rgba(64,208,144,0.1);}
.btn-sm{padding:6px 12px;font-size:12px;}

/* ── COMMANDS ── */
.command-list{display:flex;flex-direction:column;gap:8px;margin-bottom:16px;}
.command-item{background:var(--bg3);border:1px solid rgba(255,255,255,0.06);border-radius:var(--radius-sm);padding:12px;}
.command-top{display:flex;align-items:center;gap:8px;}
.command-trigger{background:var(--bg4);border:1px solid rgba(255,255,255,0.08);border-radius:var(--radius-sm);color:var(--purple-light);font-family:var(--sans);font-size:13px;padding:8px 12px;width:140px;outline:none;}
.command-trigger:focus{border-color:var(--purple);}
.command-response{flex:1;background:var(--bg4);border:1px solid rgba(255,255,255,0.08);border-radius:var(--radius-sm);color:var(--text);font-family:var(--sans);font-size:13px;padding:8px 12px;outline:none;}
.command-response:focus{border-color:var(--purple);}
.command-perms{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px;align-items:center;}
.perm-title{font-size:11px;color:var(--text-muted);margin-right:2px;}
.perm-label{display:flex;align-items:center;gap:3px;font-size:11px;font-weight:500;padding:3px 8px;border:1px solid rgba(255,255,255,0.08);border-radius:20px;cursor:pointer;user-select:none;transition:all 0.15s;color:var(--text-dim);}
.perm-label input{display:none;}
.perm-label.active.everyone{color:#aaa;border-color:rgba(170,170,170,0.4);background:rgba(170,170,170,0.1);}
.perm-label.active.sub{color:var(--yellow);border-color:rgba(240,192,96,0.4);background:rgba(240,192,96,0.1);}
.perm-label.active.vip{color:var(--pink);border-color:rgba(224,90,122,0.4);background:rgba(224,90,122,0.1);}
.perm-label.active.mod{color:var(--green);border-color:rgba(64,208,144,0.4);background:rgba(64,208,144,0.1);}
.perm-label.active.broadcaster{color:var(--purple-light);border-color:rgba(145,71,255,0.4);background:rgba(145,71,255,0.1);}

/* ── AUTO MSGS ── */
.msg-list{display:flex;flex-direction:column;gap:8px;margin-bottom:16px;}
.msg-item{display:flex;align-items:center;gap:8px;}
.msg-input{flex:1;background:var(--bg3);border:1px solid rgba(255,255,255,0.08);border-radius:var(--radius-sm);color:var(--text);font-family:var(--sans);font-size:13px;padding:10px 14px;outline:none;}
.msg-input:focus{border-color:var(--purple);}

/* ── AUTO MSG CARD ── */
.automsg-card{background:var(--bg3);border:1px solid rgba(255,255,255,0.06);border-radius:var(--radius-sm);padding:14px;display:grid;grid-template-columns:auto 1fr auto;gap:12px;align-items:center;}
.automsg-type-btn{display:flex;align-items:center;gap:6px;padding:6px 10px;border-radius:var(--radius-sm);border:1px solid rgba(255,255,255,0.1);background:var(--bg4);cursor:pointer;font-size:11px;font-weight:500;color:var(--text-dim);white-space:nowrap;transition:all 0.15s;}
.automsg-type-btn.ai{color:var(--purple-light);border-color:var(--purple-border);background:var(--purple-dim);}
.automsg-time{display:flex;align-items:center;gap:6px;white-space:nowrap;}
.automsg-time-input{background:var(--bg4);border:1px solid rgba(255,255,255,0.08);border-radius:var(--radius-sm);color:var(--text);font-family:var(--sans);font-size:13px;font-weight:500;padding:6px 8px;outline:none;width:48px;text-align:center;}
.automsg-time-input:focus{border-color:var(--purple);}
.automsg-time-label{font-size:11px;color:var(--text-muted);}
.automsg-middle{display:flex;flex-direction:column;gap:6px;}
.automsg-msg-input{background:var(--bg4);border:1px solid rgba(255,255,255,0.08);border-radius:var(--radius-sm);color:var(--text);font-family:var(--sans);font-size:13px;padding:8px 12px;outline:none;width:100%;}
.automsg-msg-input:focus{border-color:var(--purple);}
.automsg-hint{font-size:11px;color:var(--text-muted);}
.automsg-hint.ai{color:var(--purple-light);opacity:0.7;}
.words-container{display:flex;flex-wrap:wrap;gap:6px;min-height:44px;padding:10px;background:var(--bg3);border:1px solid rgba(255,255,255,0.08);border-radius:var(--radius-sm);margin-bottom:10px;}
.word-tag{display:flex;align-items:center;gap:5px;background:rgba(224,90,122,0.1);border:1px solid rgba(224,90,122,0.25);border-radius:20px;padding:4px 10px;font-size:12px;color:var(--pink);}
.word-tag button{background:none;border:none;color:var(--pink);cursor:pointer;font-size:14px;line-height:1;padding:0;opacity:0.7;}
.word-tag button:hover{opacity:1;}
/* ── SORTEO ── */
.raffle-active{background:linear-gradient(135deg,rgba(145,71,255,0.1),var(--bg2));border:1px solid var(--purple-border);border-radius:var(--radius);padding:20px;margin-bottom:16px;}
.raffle-inactive{background:var(--bg2);border:1px solid rgba(255,255,255,0.06);border-radius:var(--radius);padding:24px;margin-bottom:16px;text-align:center;}
.raffle-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;gap:12px;}
.raffle-title{font-size:16px;font-weight:600;color:var(--text);}
.raffle-prize{font-size:13px;color:var(--purple-light);margin-top:2px;}
.raffle-counter{text-align:right;}
.raffle-count{font-size:32px;font-weight:700;color:var(--purple);letter-spacing:-0.5px;line-height:1;}
.raffle-count-label{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;}
.participants-grid{display:flex;flex-wrap:wrap;gap:6px;max-height:180px;overflow-y:auto;padding:4px 0;margin:8px 0;}
.participant-tag{display:flex;align-items:center;gap:6px;background:var(--bg3);border:1px solid rgba(255,255,255,0.06);border-radius:20px;padding:4px 10px 4px 12px;font-size:12px;color:var(--text-dim);}
.participant-tag .remove-btn{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:14px;line-height:1;padding:0;display:flex;align-items:center;}
.participant-tag .remove-btn:hover{color:var(--pink);}
.raffle-actions{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;}
.raffle-cmd-hint{font-size:12px;color:var(--text-muted);margin-top:8px;}
.raffle-cmd-hint code{color:var(--purple-light);background:var(--purple-dim);padding:2px 6px;border-radius:4px;}
/* Animación ganador */
.winner-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:9999;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.4s;}
.winner-overlay.show{opacity:1;pointer-events:all;}
.winner-card{background:var(--bg2);border:2px solid var(--purple);border-radius:16px;padding:48px 40px;text-align:center;transform:scale(0.7);transition:transform 0.5s cubic-bezier(0.34,1.56,0.64,1);max-width:420px;width:90%;position:relative;overflow:hidden;}
.winner-overlay.show .winner-card{transform:scale(1);}
.winner-emoji{font-size:72px;margin-bottom:16px;display:block;animation:bounce 0.5s ease infinite alternate;}
@keyframes bounce{from{transform:translateY(0)}to{transform:translateY(-12px)}}
.winner-label{font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:2px;margin-bottom:10px;}
.winner-name{font-size:40px;font-weight:700;color:var(--purple-light);letter-spacing:-1px;margin-bottom:8px;line-height:1.1;}
.winner-prize{font-size:14px;color:var(--text-dim);margin-bottom:28px;}
.confetti-piece{position:absolute;width:8px;height:8px;border-radius:2px;animation:confettiFall 2.5s ease-in forwards;}
@keyframes confettiFall{0%{opacity:1;transform:translateY(-10px) rotate(0deg);}100%{opacity:0;transform:translateY(350px) rotate(720deg);}}

/* ── STATS BARS ── */
.stat-bar-item{margin-bottom:14px;}
.stat-bar-header{display:flex;justify-content:space-between;margin-bottom:6px;}
.stat-bar-cmd{font-size:13px;color:var(--purple-light);font-weight:500;}
.stat-bar-count{font-size:12px;color:var(--text-dim);}
.stat-bar-track{background:var(--bg3);height:6px;border-radius:3px;overflow:hidden;}
.stat-bar-fill{background:var(--purple);height:100%;border-radius:3px;transition:width 0.6s ease;}

/* ── TOAST ── */
.toast{position:fixed;bottom:24px;right:24px;z-index:1000;background:var(--bg2);border:1px solid rgba(255,255,255,0.1);border-radius:var(--radius);color:var(--text);font-size:13px;font-weight:500;padding:12px 18px;box-shadow:0 8px 32px rgba(0,0,0,0.4);transform:translateY(20px);opacity:0;transition:all 0.25s;}
.toast.show{transform:translateY(0);opacity:1;}
.toast.success{border-color:rgba(64,208,144,0.3);}
.toast.error{border-color:rgba(224,90,122,0.3);color:var(--pink);}

/* ── STATUS DOT ── */
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--green);display:inline-block;margin-right:6px;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}

/* ── LOADING ── */
.loading{text-align:center;padding:60px;color:var(--text-dim);font-size:14px;}

/* ── UPGRADE BANNER ── */
.upgrade-banner{background:linear-gradient(135deg,rgba(145,71,255,0.1),rgba(145,71,255,0.05));border:1px solid var(--purple-border);border-radius:var(--radius);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;gap:16px;margin-top:12px;}
.upgrade-text{font-size:13px;color:var(--text-dim);}
.upgrade-text strong{color:var(--text);}

/* ── MOBILE ── */
.hamburger{display:none;position:fixed;top:16px;left:16px;z-index:200;background:var(--bg2);border:1px solid rgba(255,255,255,0.08);border-radius:var(--radius-sm);padding:8px 10px;cursor:pointer;font-size:18px;color:var(--text);}
.overlay-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:99;}

@media(max-width:768px){
  .sidebar{transform:translateX(-100%);transition:transform 0.25s;}
  .sidebar.open{transform:translateX(0);}
  .main{margin-left:0;padding:20px 16px;padding-top:64px;}
  .stats-grid{grid-template-columns:repeat(2,1fr);}
  .hamburger{display:flex;align-items:center;}
  .overlay-bg.show{display:block;}
  .command-top{flex-wrap:wrap;}
  .command-trigger{width:100%;}
}
</style>
</head>
<body>

<button class="hamburger" onclick="toggleSidebar()">☰</button>
<div class="overlay-bg" id="overlayBg" onclick="toggleSidebar()"></div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <img src="data:image/webp;base64,UklGRjYBAABXRUJQVlA4TCkBAAAvM0AREDegqG0jNlcE68brAB5ZgMn+YQSTR9jRKGjbhgmCPh5DPaLzHwCAFWFnf254HyAEcBs2EoWjEAqiIAqmIP4cmvaXPIGI/k+A9tZH64+/Ajx+8xjgFM8Z7zzD9gxPe8zWY9/h8fBxPL5AHvNawGOdehqge7D18QRA26RtgWuaXS7LI/cATV9T4JrkkVzC85E2L3BKmyZtm3SjS77eIYCWQmkBdIEEtLS0gD6fkES36IcnBC1cBgZfho2NzT0Ja9n2WiQXAIkk8FoGSQlwhBZJSmAtSCSJlhMCSYqYZa9BkSTQkW0UZuwZoujzr4AozMTODFGAQ7RoM/ZsRMsZgYSYAZhBSKBDkoiEkTBS0McTKRKShEQv4X8gCSSQxCXbDz88AJIEVwAA" alt="Muffet">
    <div>
      <div class="logo-text">MuffetBot</div>
      <div class="logo-badge">Panel de Control</div>
    </div>
  </div>

  <div class="user-card">
    <img class="user-avatar" id="userAvatar" src="" alt="">
    <div>
      <div class="user-name" id="userName">Cargando...</div>
      <div class="user-plan" id="userPlan">—</div>
    </div>
  </div>

  <nav class="nav">
    <div class="nav-section">General</div>
    <div class="nav-item active" onclick="showSection('overview')"><span class="nav-icon">🏠</span> Inicio</div>
    <div class="nav-item" onclick="showSection('personality')"><span class="nav-icon">🕷️</span> Personalidad</div>
    <div class="nav-section">Bot</div>
    <div class="nav-item" onclick="showSection('commands')"><span class="nav-icon">⚡</span> Comandos</div>
    <div class="nav-item" onclick="showSection('variables')"><span class="nav-icon">📋</span> Variables</div>
    <div class="nav-item" onclick="showSection('automessages')"><span class="nav-icon">💬</span> Auto mensajes</div>
    <div class="nav-item" onclick="showSection('moderation')"><span class="nav-icon">🛡️</span> Moderación</div>
    <div class="nav-section">Herramientas</div>
    <div class="nav-item" onclick="showSection('points')"><span class="nav-icon">🏆</span> Puntos y niveles</div>
    <div class="nav-item" onclick="showSection('raffle')"><span class="nav-icon">🎉</span> Sorteos</div>
    <div class="nav-section">Análisis</div>
    <div class="nav-item" onclick="showSection('stats')"><span class="nav-icon">📊</span> Estadísticas</div>
    <div class="nav-section">Cuenta</div>
    <div class="nav-item" onclick="window.location='/plans'"><span class="nav-icon">💎</span> Planes</div>
    <div class="nav-item" onclick="showSection('socials')"><span class="nav-icon">🌐</span> Redes sociales</div>
    <div class="nav-item" onclick="showSection('settings')"><span class="nav-icon">⚙️</span> Ajustes</div>
    <div id="adminNavItem" style="display:none;" class="nav-item" onclick="window.location='/admin'"><span class="nav-icon">👑</span> Admin</div>
  </nav>

  <div class="sidebar-footer">
    <button class="btn-logout" onclick="window.location='/logout'">Cerrar sesión</button>
  </div>
</div>

<!-- MAIN -->
<div class="main" id="mainContent">
  <div class="loading">Cargando tu panel...</div>
</div>

<div class="toast" id="toast"></div>

<script>
let streamerData = null;
let userData = null;

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlayBg').classList.toggle('show');
}

async function loadData() {
  const res = await fetch('/api/streamer');
  const json = await res.json();
  streamerData = json.streamer;
  userData = json.user;

  document.getElementById('userName').textContent = userData.display_name;
  document.getElementById('userAvatar').src = userData.avatar;
  document.getElementById('userPlan').textContent =
    userData.role === 'admin' ? '👑 Admin' :
    streamerData.plan === 'pro' ? '⭐ Plan Pro' : '🆓 Plan Gratuito';

  if (userData.role === 'admin') document.getElementById('adminNavItem').style.display = 'flex';
  renderMain();
  showSection('overview');
}

function showSection(name) {
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.section').forEach(el => el.classList.remove('active'));
  const clicked = event?.target?.closest('.nav-item');
  if(clicked) clicked.classList.add('active');
  const sec = document.getElementById('sec-' + name);
  if(sec) sec.classList.add('active');
  if(name === 'raffle') { loadRaffleStatus(); startRafflePolling(); }
  else stopRafflePolling();
  if(name === 'stream') loadStreamInfo();
  if(window.innerWidth <= 768) toggleSidebar();
}

function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast show ${type}`;
  setTimeout(() => t.classList.remove('show'), 3000);
}

function togglePerm(label,perm){

  if(perm==='everyone'&&!cb.checked){item.querySelectorAll('.perm-label').forEach(l=>{l.classList.remove('active');l.querySelector('input').checked=false;});cb.checked=true;label.classList.add('active');return;}
  if(perm!=='everyone'){const el=item.querySelector('.perm-label.everyone');if(el){el.classList.remove('active');el.querySelector('input').checked=false;}}
  cb.checked=!cb.checked;label.classList.toggle('active',cb.checked);
  const any=Array.from(item.querySelectorAll('.perm-label input')).some(i=>i.checked);
  if(!any){const el=item.querySelector('.perm-label.everyone');if(el){el.classList.add('active');el.querySelector('input').checked=true;}}
}

  try {

      document.getElementById('streamStatus').innerHTML = '<span style="color:var(--pink)">⚠️ Necesitas cerrar sesión y volver a entrar para activar esta función</span>';

function searchGame(q) {
  clearTimeout(gameSearchTimer);
  if (!q.trim()) { document.getElementById('gameResults').style.display = 'none'; return; }
  gameSearchTimer = setTimeout(async () => {
    const res = await fetch(`/api/stream/search-game?q=${encodeURIComponent(q)}`);
    const games = await res.json();
    const container = document.getElementById('gameResults');
    if (!games.length) { container.style.display = 'none'; return; }
    container.style.display = 'block';
    container.innerHTML = games.map(g => `
      <div onclick="selectGame('${g.id}','${g.name.replace(/'/g,"\\'")}','${g.box_art_url?.replace('{width}x{height}','60x80')||''}')"

        <img src="${g.box_art_url?.replace('{width}x{height}','40x54')||''}" style="width:30px;height:40px;object-fit:cover;border-radius:3px;background:var(--bg4);">
        <span style="font-size:13px;color:var(--text);">${g.name}</span>

  if (!title) { showToast('El título no puede estar vacío','error'); return; }

function getLevels() {
  const rows = document.querySelectorAll('#levelsList [style*="grid"]');

}

async function loadRanking() {
  const res = await fetch('/api/points-ranking');
  if (!res.ok) { document.getElementById('rankingContent').innerHTML = '<div style="text-align:center;padding:20px;color:var(--text-muted);font-size:13px;">Error al cargar</div>'; return; }
  const data = await res.json();
  const config = streamerData.points_config || {};
  const emoji = config.emoji || '🏆';
  const name = config.name || 'puntos';
  const levels = config.levels || [];

  function getLevel(xp) {
    let current = levels[0] || {name:'Nivel 1'};
    for(const l of levels) { if(xp >= l.xp) current = l; }
    return current;
  }

  if (!data.length) {
    document.getElementById('rankingContent').innerHTML = '<div style="text-align:center;padding:20px;color:var(--text-muted);font-size:13px;">Aún no hay viewers con puntos</div>';
    return;
  }

  document.getElementById('rankingContent').innerHTML = data.slice(0,20).map((v, i) => `
    <div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.04);">
      <span style="font-size:16px;width:28px;text-align:center;">${i===0?'🥇':i===1?'🥈':i===2?'🥉':`#${i+1}`}</span>
      <div style="flex:1;">
        <div style="font-size:13px;font-weight:500;color:var(--text);">${v.username}</div>
        <div style="font-size:11px;color:var(--text-muted);">${getLevel(v.xp).name}</div>
      </div>
      <div style="text-align:right;">
        <div style="font-size:13px;font-weight:600;color:var(--purple-light);">${v.xp} ${emoji}</div>
        <div style="font-size:11px;color:var(--text-muted);">${name}</div>
      </div>
    </div>`).join('');
}

function toggleRafflePerm(label, perm) {

  if (perm === 'everyone' && !cb.checked) {
    document.querySelectorAll('#sec-raffle [data-perm]').forEach(i => { i.checked=false; i.closest('label').style.borderColor='rgba(255,255,255,0.08)'; i.closest('label').style.color='var(--text-dim)'; i.closest('label').style.background='transparent'; });
    cb.checked = true; label.style.borderColor='var(--purple)'; label.style.color='var(--purple-light)'; label.style.background='var(--purple-dim)';
    return;
  }
  if (perm !== 'everyone') {
    const evEl = document.querySelector('#sec-raffle [data-perm="everyone"]');
    if (evEl) { evEl.checked=false; evEl.closest('label').style.borderColor='rgba(255,255,255,0.08)'; evEl.closest('label').style.color='var(--text-dim)'; evEl.closest('label').style.background='transparent'; }
  }
  cb.checked = !cb.checked;
  label.style.borderColor = cb.checked ? 'var(--purple)' : 'rgba(255,255,255,0.08)';
  label.style.color = cb.checked ? 'var(--purple-light)' : 'var(--text-dim)';
  label.style.background = cb.checked ? 'var(--purple-dim)' : 'transparent';
}

  if (!prize) return;
  const res = await fetch('/api/raffle/start', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ prize }) });
  if (res.ok) { showToast('¡Sorteo iniciado! 🎉'); loadRaffleStatus(); startRafflePolling(); }
  else showToast('Error al iniciar','error');
}

async function endRaffle() {
  const res = await fetch('/api/raffle/end', { method:'POST' });
  const data = await res.json();
  if (res.ok && data.winner) { stopRafflePolling(); showWinner(data.winner, data.prize); loadRaffleStatus(); }
  else if (res.ok) { showToast('No hay participantes aún~ 🕷️','error'); }
  else showToast('Error','error');
}

async function cancelRaffle() {
  if (!confirm('¿Cancelar el sorteo?')) return;
  const res = await fetch('/api/raffle/cancel', { method:'POST' });
  if (res.ok) { stopRafflePolling(); showToast('Sorteo cancelado'); loadRaffleStatus(); }
}

async function removeParticipant(username) {
  const res = await fetch('/api/raffle/remove', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ username }) });
  if (res.ok) loadRaffleStatus();
}

async function loadRaffleStatus() {
  const res = await fetch('/api/raffle/status');
  if (!res.ok) return;
  const data = await res.json();
  const panel = document.getElementById('rafflePanel');
  if (!panel) return;

  if (!data.active) {
    panel.innerHTML = `
      <div class="raffle-inactive">
        <div style="font-size:32px;margin-bottom:12px;">🎉</div>
        <div style="font-size:15px;font-weight:500;color:var(--text);margin-bottom:6px;">No hay sorteo activo</div>
        <div style="font-size:13px;color:var(--text-dim);margin-bottom:20px;">Inicia uno y la gente puede entrar con el comando configurado</div>
        <button class="btn btn-primary" onclick="startRaffle()">🎉 Iniciar sorteo</button>
      </div>`;
    return;
  }

  const participants = data.participants || [];
  const joinCmd = streamerData.raffle_settings?.join_cmd || '!entrar';
  panel.innerHTML = `
    <div class="raffle-active">
      <div class="raffle-header">
        <div>
          <div class="raffle-title">🎉 Sorteo en curso</div>
          <div class="raffle-prize">🏆 Premio: ${data.prize}</div>
          <div class="raffle-cmd-hint">La gente entra escribiendo <code>${joinCmd}</code> en el chat</div>
        </div>
        <div class="raffle-counter">
          <div class="raffle-count">${participants.length}</div>
          <div class="raffle-count-label">participantes</div>
        </div>
      </div>
      <div class="participants-grid" id="participantsList">
        ${participants.length ? participants.map(p => `
          <div class="participant-tag">
            ${p}
            <button class="remove-btn" onclick="removeParticipant('${p}')" title="Eliminar">×</button>
          </div>`).join('') : '<div style="color:var(--text-muted);font-size:12px;padding:8px;">Esperando participantes...</div>'}
      </div>
      <div class="raffle-actions">
        <button class="btn btn-primary" onclick="endRaffle()" ${participants.length===0?'disabled':''}>🏆 Elegir ganador</button>
        <button class="btn btn-danger" onclick="cancelRaffle()">Cancelar sorteo</button>
      </div>
    </div>`;
}

function startRafflePolling() {
  stopRafflePolling();
  raffleInterval = setInterval(loadRaffleStatus, 3000);
}
function stopRafflePolling() {
  if (raffleInterval) { clearInterval(raffleInterval); raffleInterval = null; }
}

function showWinner(winner, prize) {
  const colors = ['#9147ff','#f0c060','#40d090','#e05a7a','#60a0f0'];
  let confettiHtml = '';
  for(let i=0;i<30;i++){
    const x=Math.random()*100;const delay=Math.random()*1.5;const color=colors[Math.floor(Math.random()*colors.length)];
    confettiHtml+=`<div class="confetti-piece" style="left:${x}%;background:${color};animation-delay:${delay}s;animation-duration:${2+Math.random()}s;"></div>`;
  }
  const overlay = document.createElement('div');
  overlay.className = 'winner-overlay';
  overlay.innerHTML = `
    <div class="winner-card">
      <div class="confetti">${confettiHtml}</div>
      <span class="winner-emoji">🏆</span>
      <div class="winner-label">¡Ganador del sorteo!</div>
      <div class="winner-name">${winner}</div>
      <div class="winner-prize">🎁 ${prize}</div>
      <button class="btn btn-primary" onclick="this.closest('.winner-overlay').remove()">Cerrar</button>
    </div>`;
  document.body.appendChild(overlay);
  setTimeout(() => overlay.classList.add('show'), 10);
}

// Cargar estado del sorteo al entrar a la sección

loadData();

</script>
