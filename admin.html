<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MuffetBot — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Silkscreen&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--pink:#e05a7a;--purple:#9147ff;--purple-dim:#4a2080;--purple-light:#b388ff;--bg:#0a0a0c;--bg2:#111115;--bg3:#1a0022;--bg4:#0f0f18;--text:#f0d0da;--text-dim:#8a6a72;--green:#40d090;--yellow:#f0c060;--mono:'Share Tech Mono',monospace;--display:'VT323',monospace;--title:'Silkscreen',monospace;}
html,body{width:100%;min-height:100%;background:var(--bg);font-family:var(--mono);color:var(--text);}

.sidebar{position:fixed;top:0;left:0;width:220px;height:100vh;background:var(--bg2);border-right:1px solid var(--purple-dim);display:flex;flex-direction:column;z-index:100;}
.sidebar-logo{padding:20px 16px;border-bottom:1px solid var(--purple-dim);display:flex;align-items:center;gap:10px;}
.sidebar-logo img{width:36px;height:36px;image-rendering:pixelated;filter:drop-shadow(0 0 6px rgba(145,71,255,0.6));}
.logo-text{font-family:var(--display);font-size:26px;color:var(--purple);letter-spacing:2px;}
.logo-sub{font-family:var(--title);font-size:7px;color:var(--yellow);letter-spacing:1px;}
.nav{flex:1;padding:10px 0;}
.nav-section{font-family:var(--title);font-size:7px;color:var(--text-dim);letter-spacing:2px;padding:10px 16px 4px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;font-size:10px;color:var(--text-dim);letter-spacing:1px;transition:all 0.2s;border-left:3px solid transparent;}
.nav-item:hover{background:rgba(145,71,255,0.1);color:var(--text);}
.nav-item.active{background:rgba(145,71,255,0.15);color:var(--purple-light);border-left-color:var(--purple);}
.nav-icon{font-size:16px;width:20px;text-align:center;}
.sidebar-footer{padding:14px 16px;border-top:1px solid var(--purple-dim);display:flex;gap:8px;}
.btn-sm-nav{flex:1;padding:7px;background:transparent;border:1px solid var(--purple-dim);color:var(--text-dim);font-family:var(--title);font-size:7px;letter-spacing:1px;cursor:pointer;transition:all 0.2s;}
.btn-sm-nav:hover{border-color:var(--pink);color:var(--pink);}

.main{margin-left:220px;min-height:100vh;padding:24px;}
.page-header{margin-bottom:24px;}
.page-title{font-family:var(--display);font-size:36px;color:var(--yellow);letter-spacing:2px;line-height:1;}
.page-subtitle{font-size:10px;color:var(--text-dim);letter-spacing:2px;margin-top:4px;}

.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;}
.stat-card{background:var(--bg2);border:1px solid var(--purple-dim);padding:16px;text-align:center;}
.stat-icon{font-size:24px;margin-bottom:6px;}
.stat-value{font-family:var(--display);font-size:32px;color:var(--purple);line-height:1;}
.stat-label{font-family:var(--title);font-size:7px;color:var(--text-dim);letter-spacing:1px;margin-top:4px;}

.panel{background:var(--bg2);border:1px solid var(--purple-dim);margin-bottom:16px;}
.panel-header{background:var(--bg3);padding:10px 16px;border-bottom:1px solid var(--purple-dim);display:flex;align-items:center;justify-content:space-between;}
.panel-title-text{font-family:var(--title);font-size:9px;color:var(--text);letter-spacing:2px;}
.panel-body{padding:0;}

/* Tabla de streamers */
.streamers-table{width:100%;border-collapse:collapse;}
.streamers-table th{background:var(--bg4);font-family:var(--title);font-size:8px;color:var(--text-dim);letter-spacing:1px;padding:10px 14px;text-align:left;border-bottom:1px solid var(--purple-dim);}
.streamers-table td{padding:10px 14px;border-bottom:1px solid rgba(145,71,255,0.07);font-size:10px;vertical-align:middle;}
.streamers-table tr:hover td{background:rgba(145,71,255,0.05);}
.streamers-table tr:last-child td{border-bottom:none;}

.avatar-sm{width:28px;height:28px;border-radius:50%;border:1px solid var(--purple-dim);margin-right:8px;vertical-align:middle;}

/* Badges de rol */
.badge-role{font-family:var(--title);font-size:7px;letter-spacing:1px;padding:2px 8px;border:1px solid;}
.badge-admin    {color:var(--yellow);border-color:var(--yellow);background:rgba(240,192,96,0.1);}
.badge-streamer {color:var(--green);border-color:var(--green);background:rgba(64,208,144,0.1);}
.badge-pending  {color:var(--purple-light);border-color:var(--purple);background:rgba(145,71,255,0.1);}
.badge-blocked  {color:var(--pink);border-color:var(--pink);background:rgba(224,90,122,0.1);}

/* Acciones */
.actions{display:flex;gap:6px;}
.btn-action{font-family:var(--title);font-size:7px;letter-spacing:1px;padding:4px 10px;border:1px solid;background:transparent;cursor:pointer;transition:all 0.15s;}
.btn-approve{color:var(--green);border-color:var(--green);}
.btn-approve:hover{background:rgba(64,208,144,0.15);}
.btn-revoke{color:var(--pink);border-color:var(--pink);}
.btn-revoke:hover{background:rgba(224,90,122,0.15);}
.btn-dashboard{color:var(--purple-light);border-color:var(--purple-dim);}
.btn-dashboard:hover{background:rgba(145,71,255,0.15);}

/* Toast */
.toast{position:fixed;bottom:20px;right:20px;z-index:1000;background:var(--bg2);border:1px solid var(--green);color:var(--green);font-family:var(--title);font-size:9px;letter-spacing:1px;padding:12px 20px;transform:translateY(100px);opacity:0;transition:all 0.3s;}
.toast.show{transform:translateY(0);opacity:1;}
.toast.error{border-color:var(--pink);color:var(--pink);}

.loading{text-align:center;padding:40px;color:var(--text-dim);font-family:var(--display);font-size:24px;}
.empty{text-align:center;padding:30px;color:var(--text-dim);font-size:11px;}

/* Search */
.search-bar{display:flex;gap:10px;padding:12px 14px;border-bottom:1px solid var(--purple-dim);background:var(--bg4);}
.search-input{flex:1;background:var(--bg3);border:1px solid var(--purple-dim);color:var(--text);font-family:var(--mono);font-size:10px;padding:6px 10px;outline:none;}
.search-input:focus{border-color:var(--purple);}
.filter-btn{font-family:var(--title);font-size:7px;padding:6px 10px;border:1px solid var(--purple-dim);background:transparent;color:var(--text-dim);cursor:pointer;letter-spacing:1px;}
.filter-btn.active{border-color:var(--purple);color:var(--purple-light);background:rgba(145,71,255,0.1);}
</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-logo">
    <img src="data:image/webp;base64,UklGRjYBAABXRUJQVlA4TCkBAAAvM0AREDegqG0jNlcE68brAB5ZgMn+YQSTR9jRKGjbhgmCPh5DPaLzHwCAFWFnf254HyAEcBs2EoWjEAqiIAqmIP4cmvaXPIGI/k+A9tZH64+/Ajx+8xjgFM8Z7zzD9gxPe8zWY9/h8fBxPL5AHvNawGOdehqge7D18QRA26RtgWuaXS7LI/cATV9T4JrkkVzC85E2L3BKmyZtm3SjS77eIYCWQmkBdIEEtLS0gD6fkES36IcnBC1cBgZfho2NzT0Ja9n2WiQXAIkk8FoGSQlwhBZJSmAtSCSJlhMCSYqYZa9BkSTQkW0UZuwZoujzr4AozMTODFGAQ7RoM/ZsRMsZgYSYAZhBSKBDkoiEkTBS0McTKRKShEQv4X8gCSSQxCXbDz88AJIEVwAA" alt="Muffet">
    <div>
      <div class="logo-text">ADMIN</div>
      <div class="logo-sub">👑 PANEL DEL REY OSO</div>
    </div>
  </div>
  <nav class="nav">
    <div class="nav-section">ADMINISTRACIÓN</div>
    <div class="nav-item active"><span class="nav-icon">👥</span> STREAMERS</div>
    <div class="nav-section">MI CANAL</div>
    <div class="nav-item" onclick="window.location='/dashboard'"><span class="nav-icon">🎮</span> MI DASHBOARD</div>
  </nav>
  <div class="sidebar-footer">
    <button class="btn-sm-nav" onclick="window.location='/logout'">🚪 SALIR</button>
  </div>
</div>

<div class="main">
  <div class="page-header">
    <div class="page-title">👑 PANEL DE ADMIN</div>
    <div class="page-subtitle">GESTIÓN DE STREAMERS — ELOSOKING1</div>
  </div>

  <div class="stats-grid" id="statsGrid">
    <div class="stat-card"><div class="stat-icon">👥</div><div class="stat-value" id="totalCount">—</div><div class="stat-label">TOTAL</div></div>
    <div class="stat-card"><div class="stat-icon">✅</div><div class="stat-value" id="activeCount">—</div><div class="stat-label">ACTIVOS</div></div>
    <div class="stat-card"><div class="stat-icon">⏳</div><div class="stat-value" id="pendingCount">—</div><div class="stat-label">PENDIENTES</div></div>
    <div class="stat-card"><div class="stat-icon">❌</div><div class="stat-value" id="blockedCount">—</div><div class="stat-label">BLOQUEADOS</div></div>
  </div>

  <div class="panel">
    <div class="panel-header">
      <span class="panel-title-text">🕷️ LISTA DE STREAMERS</span>
      <button class="btn-action btn-approve" onclick="loadStreamers()">↻ ACTUALIZAR</button>
    </div>
    <div class="search-bar">
      <input class="search-input" id="searchInput" placeholder="Buscar streamer..." oninput="filterStreamers()">
      <button class="filter-btn active" id="filter-all" onclick="setFilter('all')">TODOS</button>
      <button class="filter-btn" id="filter-pending" onclick="setFilter('pending')">PENDIENTES</button>
      <button class="filter-btn" id="filter-streamer" onclick="setFilter('streamer')">ACTIVOS</button>
      <button class="filter-btn" id="filter-blocked" onclick="setFilter('blocked')">BLOQUEADOS</button>
    </div>
    <div class="panel-body">
      <div id="streamersContent" class="loading">🕷️ Cargando streamers...</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let allStreamers = [];
let currentFilter = 'all';

function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (type==='error' ? ' error' : '');
  setTimeout(() => t.classList.remove('show'), 3000);
}

function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('filter-'+f).classList.add('active');
  renderStreamers();
}

function filterStreamers() { renderStreamers(); }

function getBadge(role) {
  const map = { admin:'badge-admin', streamer:'badge-streamer', pending:'badge-pending', blocked:'badge-blocked' };
  const labels = { admin:'👑 ADMIN', streamer:'✅ ACTIVO', pending:'⏳ PENDIENTE', blocked:'❌ BLOQUEADO' };
  return `<span class="badge-role ${map[role]||'badge-pending'}">${labels[role]||role.toUpperCase()}</span>`;
}

function renderStreamers() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  let filtered = allStreamers.filter(s => {
    const matchSearch = s.twitch_username.toLowerCase().includes(search);
    const matchFilter = currentFilter === 'all' || s.role === currentFilter;
    return matchSearch && matchFilter;
  });

  // Stats
  document.getElementById('totalCount').textContent   = allStreamers.length;
  document.getElementById('activeCount').textContent  = allStreamers.filter(s => s.approved && s.role !== 'admin').length;
  document.getElementById('pendingCount').textContent = allStreamers.filter(s => s.role === 'pending').length;
  document.getElementById('blockedCount').textContent = allStreamers.filter(s => s.role === 'blocked').length;

  if (filtered.length === 0) {
    document.getElementById('streamersContent').innerHTML = '<div class="empty">🕷️ No hay streamers en esta categoría</div>';
    return;
  }

  document.getElementById('streamersContent').innerHTML = `
    <table class="streamers-table">
      <thead>
        <tr>
          <th>STREAMER</th>
          <th>ROL</th>
          <th>PLAN</th>
          <th>IA</th>
          <th>MOD</th>
          <th>REGISTRO</th>
          <th>ACCIONES</th>
        </tr>
      </thead>
      <tbody>
        ${filtered.map(s => `
          <tr>
            <td>
              <a href="https://twitch.tv/${s.twitch_username}" target="_blank" style="color:var(--purple-light);text-decoration:none;">
                ${s.twitch_username}
              </a>
            </td>
            <td>${getBadge(s.role)}</td>
            <td>
              ${s.plan === 'pro' 
                ? `<span style="color:var(--yellow);font-family:var(--title);font-size:8px;">⭐ PRO</span>` 
                : s.plan === 'admin'
                ? `<span style="color:var(--purple-light);font-family:var(--title);font-size:8px;">👑 ADMIN</span>`
                : `<span style="color:var(--text-dim);font-family:var(--title);font-size:8px;">🆓 FREE</span>`}
            </td>
            <td style="color:${s.ai_enabled?'var(--green)':'var(--text-dim)'}">${s.ai_enabled?'ON':'OFF'}</td>
            <td style="color:${s.mod_enabled?'var(--green)':'var(--text-dim)'}">${s.mod_enabled?'ON':'OFF'}</td>
            <td style="color:var(--text-dim);font-size:9px;">${new Date(s.created_at).toLocaleDateString('es-DO')}</td>
            <td>
              <div class="actions">
                ${s.role !== 'admin' ? `
                  ${!s.approved || s.role === 'pending' ? `<button class="btn-action btn-approve" onclick="approve(${s.id})">✅ APROBAR</button>` : ''}
                  ${s.approved && s.role !== 'blocked' ? `<button class="btn-action btn-revoke" onclick="revoke(${s.id})">❌ REVOCAR</button>` : ''}
                  ${s.role === 'blocked' ? `<button class="btn-action btn-approve" onclick="approve(${s.id})">🔓 RESTAURAR</button>` : ''}
                  ${s.approved && s.plan !== 'pro' && s.plan !== 'admin' ? `<button class="btn-action" style="color:var(--yellow);border-color:#806020;" onclick="setPlan(${s.id},'pro')">⭐ DAR PRO</button>` : ''}
                  ${s.plan === 'pro' ? `<button class="btn-action" style="color:var(--text-dim);border-color:#444;" onclick="setPlan(${s.id},'free')">↓ BAJAR FREE</button>` : ''}
                ` : '<span style="color:var(--yellow);font-size:9px;">👑 TÚ</span>'}
              </div>
            </td>
          </tr>
        `).join('')}
      </tbody>
    </table>
  `;
}

async function loadStreamers() {
  document.getElementById('streamersContent').innerHTML = '<div class="loading">🕷️ Cargando...</div>';
  try {
    const res = await fetch('/api/admin/streamers');
    allStreamers = await res.json();
    renderStreamers();
  } catch (err) {
    document.getElementById('streamersContent').innerHTML = '<div class="empty">Error cargando streamers</div>';
  }
}

async function setPlan(id, plan) {
  const res = await fetch(`/api/admin/plan/${id}`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({plan}) });
  if (res.ok) { showToast(plan === 'pro' ? '⭐ Plan Pro activado!' : '↓ Plan bajado a Free'); loadStreamers(); }
  else showToast('Error al cambiar plan', 'error');
}

async function approve(id) {
  const res = await fetch(`/api/admin/approve/${id}`, { method:'POST' });
  if (res.ok) { showToast('✅ ¡Streamer aprobado!'); loadStreamers(); }
  else showToast('Error al aprobar', 'error');
}

async function revoke(id) {
  if (!confirm('¿Revocar acceso a este streamer?')) return;
  const res = await fetch(`/api/admin/revoke/${id}`, { method:'POST' });
  if (res.ok) { showToast('❌ Acceso revocado'); loadStreamers(); }
  else showToast('Error al revocar', 'error');
}

loadStreamers();
</script>
</body>
</html>
