<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MuffetBot — Canal</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --accent:#9147ff;
  --accent-dim:rgba(145,71,255,0.12);
  --accent-border:rgba(145,71,255,0.25);
  --accent-light:#b388ff;
  --green:#40d090;--yellow:#f0c060;--pink:#e05a7a;
  --bg:#0a0a0c;--bg2:#111113;--bg3:#17171a;--bg4:#0d0d0f;
  --text:#eeeef5;--text-dim:#6b6b82;--text-muted:#2e2e3a;
  --sans:'Inter',sans-serif;--radius:14px;--radius-sm:8px;
}
html,body{width:100%;min-height:100%;background:var(--bg);font-family:var(--sans);color:var(--text);}

/* BG */
.bg-glow{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 100% 40% at 50% 0%,var(--accent-glow,rgba(145,71,255,0.08)) 0%,transparent 60%);}

/* NAV */
nav{position:sticky;top:0;z-index:100;padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between;
  background:rgba(10,10,12,0.85);backdrop-filter:blur(16px);border-bottom:1px solid rgba(255,255,255,0.05);}
.nav-logo{display:flex;align-items:center;gap:8px;text-decoration:none;}
.nav-logo img{width:24px;height:24px;image-rendering:pixelated;filter:drop-shadow(0 0 6px rgba(145,71,255,0.5));}
.nav-logo-text{font-size:14px;font-weight:700;color:var(--text);}
.nav-btn{font-size:12px;font-weight:600;padding:7px 18px;border-radius:20px;cursor:pointer;
  text-decoration:none;background:var(--accent);color:white;border:none;transition:opacity 0.15s;
  box-shadow:0 0 12px rgba(145,71,255,0.3);}
.nav-btn:hover{opacity:0.85;}

/* HERO BANNER */
.hero-banner{position:relative;z-index:1;overflow:hidden;}
.hero-bg{width:100%;height:220px;object-fit:cover;display:block;opacity:0.35;filter:blur(2px) saturate(0.5);background:var(--bg2);}
.hero-bg-fallback{width:100%;height:220px;background:linear-gradient(135deg,var(--accent-dim),var(--bg2));}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(10,10,12,0.2) 0%,rgba(10,10,12,0.9) 70%,var(--bg) 100%);}

/* HERO INFO */
.hero-content{position:relative;z-index:1;max-width:860px;margin:-80px auto 0;padding:0 24px;}
.hero-card{display:flex;align-items:flex-end;gap:20px;padding-bottom:20px;}
.avatar-wrap{position:relative;flex-shrink:0;}
.channel-avatar{width:110px;height:110px;border-radius:50%;border:4px solid var(--bg);
  background:var(--bg2);box-shadow:0 0 0 2px var(--accent-border),0 8px 32px rgba(0,0,0,0.5);object-fit:cover;}
.live-badge{position:absolute;bottom:6px;right:6px;background:#e05a7a;color:white;
  font-size:9px;font-weight:700;padding:2px 7px;border-radius:8px;border:2px solid var(--bg);
  text-transform:uppercase;letter-spacing:0.5px;display:none;}
.hero-info{flex:1;padding-bottom:4px;}
.channel-name{font-size:clamp(22px,4vw,32px);font-weight:800;letter-spacing:-0.5px;line-height:1.1;}
.channel-meta{display:flex;align-items:center;gap:10px;margin-top:8px;flex-wrap:wrap;}
.meta-badge{display:inline-flex;align-items:center;gap:5px;border-radius:20px;
  padding:4px 12px;font-size:11px;font-weight:600;}
.meta-badge.bot{background:var(--accent-dim);border:1px solid var(--accent-border);color:var(--accent-light);}
.meta-badge.twitch{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);color:var(--text-dim);}
.twitch-link{font-size:12px;color:var(--text-dim);text-decoration:none;transition:color 0.15s;margin-top:4px;display:flex;align-items:center;gap:5px;}
.twitch-link:hover{color:var(--accent-light);}

/* SOCIALS */
.socials-row{display:flex;flex-wrap:wrap;gap:8px;padding:20px 24px;max-width:860px;margin:0 auto;position:relative;z-index:1;}
.social-btn{display:flex;align-items:center;gap:8px;padding:9px 18px;border-radius:20px;
  font-size:13px;font-weight:600;text-decoration:none;transition:all 0.15s;border:1px solid;}
.social-btn:hover{transform:translateY(-1px);}
.social-twitch{background:rgba(145,71,255,0.1);border-color:rgba(145,71,255,0.25);color:#b388ff;}
.social-youtube{background:rgba(255,0,0,0.08);border-color:rgba(255,0,0,0.2);color:#ff5555;}
.social-tiktok{background:rgba(255,255,255,0.05);border-color:rgba(255,255,255,0.1);color:var(--text-dim);}
.social-twitter{background:rgba(29,161,242,0.08);border-color:rgba(29,161,242,0.2);color:#1da1f2;}
.social-instagram{background:rgba(225,48,108,0.08);border-color:rgba(225,48,108,0.2);color:#e1306c;}
.social-discord{background:rgba(88,101,242,0.08);border-color:rgba(88,101,242,0.2);color:#7289da;}

/* MAIN */
.main{position:relative;z-index:1;max-width:860px;margin:0 auto;padding:8px 24px 80px;}

/* PANEL */
.panel{background:var(--bg2);border:1px solid rgba(255,255,255,0.06);border-radius:var(--radius);
  overflow:hidden;margin-bottom:16px;transition:border-color 0.15s;}
.panel:hover{border-color:rgba(255,255,255,0.09);}
.panel-header{padding:16px 20px;border-bottom:1px solid rgba(255,255,255,0.05);
  display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,0.01);}
.panel-title{font-size:14px;font-weight:700;color:var(--text);}
.panel-badge{font-size:11px;color:var(--text-muted);background:var(--bg3);
  padding:3px 10px;border-radius:10px;font-weight:500;}
.panel-body{padding:18px 20px;}

/* GRID */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;}
@media(max-width:620px){.grid-2{grid-template-columns:1fr;}}

/* TOP VIEWERS */
.top-list{display:flex;flex-direction:column;gap:8px;}
.top-item{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:var(--radius-sm);
  background:var(--bg3);border:1px solid rgba(255,255,255,0.04);transition:border-color 0.15s;}
.top-item:hover{border-color:rgba(255,255,255,0.08);}
.top-item.first{background:linear-gradient(135deg,rgba(240,192,96,0.08),var(--bg3));border-color:rgba(240,192,96,0.2);}
.top-medal{font-size:18px;width:28px;text-align:center;flex-shrink:0;}
.top-info{flex:1;min-width:0;}
.top-name{font-size:13px;font-weight:600;color:var(--text);}
.top-level{font-size:11px;color:var(--text-muted);margin-top:2px;}
.top-right{text-align:right;flex-shrink:0;}
.top-pts{font-size:14px;font-weight:700;color:var(--yellow);}
.top-bar-wrap{width:60px;height:3px;background:rgba(255,255,255,0.05);border-radius:2px;margin-top:4px;overflow:hidden;}
.top-bar{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--yellow),rgba(240,192,96,0.5));}

/* COMANDOS */
.cmd-search{width:100%;background:var(--bg3);border:1px solid rgba(255,255,255,0.07);
  border-radius:var(--radius-sm);color:var(--text);font-family:var(--sans);font-size:13px;
  padding:10px 14px 10px 36px;outline:none;transition:border-color 0.15s;margin-bottom:12px;}
.cmd-search:focus{border-color:var(--accent-border);}
.cmd-search-wrap{position:relative;}
.cmd-search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:14px;}
.cmd-list{display:flex;flex-direction:column;gap:5px;}
.cmd-item{display:flex;align-items:center;gap:12px;padding:10px 14px;background:var(--bg3);
  border-radius:var(--radius-sm);cursor:pointer;transition:all 0.15s;border:1px solid transparent;}
.cmd-item:hover{border-color:var(--accent-border);background:var(--bg4);}
.cmd-trigger{font-size:12px;font-weight:700;color:var(--accent-light);font-family:monospace;
  background:var(--accent-dim);border:1px solid var(--accent-border);border-radius:6px;
  padding:3px 8px;flex-shrink:0;white-space:nowrap;}
.cmd-response{font-size:12px;color:var(--text-dim);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.cmd-copy{font-size:10px;color:var(--text-muted);flex-shrink:0;padding:3px 8px;
  border:1px solid rgba(255,255,255,0.06);border-radius:4px;opacity:0;transition:opacity 0.15s;}
.cmd-item:hover .cmd-copy{opacity:1;color:var(--accent-light);border-color:var(--accent-border);}

/* HORARIO */
.schedule-list{display:flex;flex-direction:column;gap:6px;}
.schedule-item{display:flex;align-items:center;gap:14px;padding:11px 14px;
  background:var(--bg3);border-radius:var(--radius-sm);border:1px solid rgba(255,255,255,0.04);}
.schedule-item.today{background:linear-gradient(135deg,var(--accent-dim),var(--bg3));
  border-color:var(--accent-border);}
.schedule-dot{width:8px;height:8px;border-radius:50%;background:var(--text-muted);flex-shrink:0;}
.schedule-item.today .schedule-dot{background:var(--green);box-shadow:0 0 8px rgba(64,208,144,0.5);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}
.schedule-day-name{font-size:13px;font-weight:600;min-width:90px;}
.schedule-item.today .schedule-day-name{color:var(--accent-light);}
.schedule-time{font-size:12px;color:var(--text-dim);}
.schedule-note{font-size:11px;color:var(--text-muted);margin-left:auto;font-style:italic;}
.schedule-today-badge{font-size:10px;font-weight:700;color:var(--green);background:rgba(64,208,144,0.1);
  border:1px solid rgba(64,208,144,0.2);border-radius:8px;padding:2px 7px;margin-left:4px;}

/* MEDIA */
.media-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
@media(max-width:620px){.media-grid{grid-template-columns:repeat(2,1fr);}}
.media-card{border-radius:var(--radius-sm);overflow:hidden;background:var(--bg3);
  border:1px solid rgba(255,255,255,0.06);text-decoration:none;display:block;transition:all 0.2s;position:relative;}
.media-card:hover{border-color:var(--accent-border);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,0.3);}
.media-thumb-wrap{position:relative;aspect-ratio:16/9;overflow:hidden;}
.media-thumb{width:100%;height:100%;object-fit:cover;background:var(--bg4);display:block;transition:transform 0.2s;}
.media-card:hover .media-thumb{transform:scale(1.04);}
.media-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,0.6) 0%,transparent 50%);
  opacity:0;transition:opacity 0.2s;display:flex;align-items:center;justify-content:center;}
.media-card:hover .media-overlay{opacity:1;}
.media-play{width:40px;height:40px;background:rgba(255,255,255,0.9);border-radius:50%;
  display:flex;align-items:center;justify-content:center;font-size:16px;}
.media-duration{position:absolute;bottom:6px;right:6px;background:rgba(0,0,0,0.8);
  border-radius:4px;padding:2px 6px;font-size:10px;color:white;font-weight:600;}
.media-info{padding:10px 12px;}
.media-title{font-size:12px;font-weight:500;color:var(--text);line-height:1.4;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.media-meta{font-size:10px;color:var(--text-muted);margin-top:4px;display:flex;align-items:center;gap:6px;}

/* EMPTY */
.empty{text-align:center;padding:32px;color:var(--text-muted);font-size:13px;}

/* SKELETON */
.skeleton{background:linear-gradient(90deg,var(--bg2) 25%,var(--bg3) 50%,var(--bg2) 75%);
  background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:var(--radius-sm);}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* ERROR */
.error-card{max-width:380px;margin:80px auto;background:var(--bg2);border:1px solid rgba(224,90,122,0.2);
  border-radius:var(--radius);padding:48px;text-align:center;}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:var(--bg2);border:1px solid rgba(64,208,144,0.3);
  border-radius:var(--radius-sm);color:var(--green);font-size:13px;font-weight:500;padding:10px 18px;
  transform:translateY(20px);opacity:0;transition:all 0.25s;z-index:200;box-shadow:0 8px 24px rgba(0,0,0,0.4);}
.toast.show{transform:translateY(0);opacity:1;}

/* FOOTER */
.footer{position:relative;z-index:1;text-align:center;padding:0 24px 48px;max-width:860px;margin:0 auto;}
.footer-text{font-size:12px;color:var(--text-muted);margin-bottom:14px;}
.footer-links{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
.footer-link{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;
  border-radius:20px;text-decoration:none;font-size:12px;font-weight:500;transition:all 0.15s;}
.footer-link:hover{transform:translateY(-1px);}
.footer-link-discord{background:rgba(88,101,242,0.1);border:1px solid rgba(88,101,242,0.2);color:#7289da;}
.footer-link-kofi{background:rgba(255,94,91,0.1);border:1px solid rgba(255,94,91,0.2);color:#ff5e5b;}

@media(max-width:600px){
  .hero-card{gap:14px;}
  .channel-avatar{width:80px;height:80px;}
  .channel-name{font-size:22px;}
  .hero-content{margin-top:-60px;}
  .main{padding:8px 16px 60px;}
  .socials-row{padding:16px;}
  .media-grid{grid-template-columns:repeat(2,1fr);}
}
</style>
</head>

<script>
const socialIcons   = {twitch:'🎮',youtube:'📺',tiktok:'🎵',twitter:'🐦',instagram:'📸',discord:'💬',donaciones:'💸'};
const socialLabels  = {twitch:'Twitch',youtube:'YouTube',tiktok:'TikTok',twitter:'Twitter/X',instagram:'Instagram',discord:'Discord',donaciones:'Donaciones'};
const socialClasses = {twitch:'social-twitch',youtube:'social-youtube',tiktok:'social-tiktok',twitter:'social-twitter',instagram:'social-instagram',discord:'social-discord',donaciones:'social-discord'};

function showToast(msg='✓ Copiado') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function copyCmd(trigger) {
  navigator.clipboard.writeText(trigger).then(() => showToast(`✓ Copiado: ${trigger}`)).catch(()=>{});
}

function setAccent(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  document.documentElement.style.setProperty('--accent', hex);
  document.documentElement.style.setProperty('--accent-dim', `rgba(${r},${g},${b},0.12)`);
  document.documentElement.style.setProperty('--accent-border', `rgba(${r},${g},${b},0.28)`);
  document.documentElement.style.setProperty('--accent-light', `rgb(${Math.min(255,r+55)},${Math.min(255,g+55)},${Math.min(255,b+55)})`);
  document.documentElement.style.setProperty('--accent-glow', `rgba(${r},${g},${b},0.1)`);
}

function filterCmds(val) {
  const q = val.toLowerCase();
  document.querySelectorAll('.cmd-item').forEach(item => {
    const t = item.dataset.trigger?.toLowerCase() || '';
    const r = item.dataset.response?.toLowerCase() || '';
    item.style.display = (!q || t.includes(q) || r.includes(q)) ? 'flex' : 'none';
  });
}

async function loadCanal() {
  const username = window.location.pathname.split('/canal/')[1];
  if (!username) { showError('Canal no especificado'); return; }

  // Skeleton
  document.getElementById('heroSection').innerHTML = `
    <div style="max-width:860px;margin:0 auto;padding:32px 24px;">
      <div style="display:flex;align-items:center;gap:20px;">
        <div class="skeleton" style="width:110px;height:110px;border-radius:50%;flex-shrink:0;"></div>
        <div style="flex:1;display:flex;flex-direction:column;gap:10px;">
          <div class="skeleton" style="height:32px;width:220px;border-radius:8px;"></div>
          <div class="skeleton" style="height:22px;width:160px;border-radius:20px;"></div>
          <div class="skeleton" style="height:16px;width:140px;border-radius:4px;"></div>
        </div>
      </div>
    </div>`;

  try {
    const res = await fetch(`/api/canal/${username}`);
    if (!res.ok) { showError(`El canal "${username}" no existe o no está disponible`); return; }
    const data = await res.json();

    const accent = data.social_links?.accent_color || '#9147ff';
    setAccent(accent);

    const displayName = data.public_name || data.username;
    document.title = `${displayName} — Canal`;

    // Hero con banner de color
    document.getElementById('heroSection').innerHTML = `
      <div class="hero-banner">
        <div class="hero-bg-fallback" style="background:linear-gradient(135deg,var(--accent-dim),var(--bg2),var(--bg3));"></div>
        <div class="hero-overlay"></div>
      </div>
      <div class="hero-content">
        <div class="hero-card">
          <div class="avatar-wrap">
            <img class="channel-avatar" id="channelAvatar"
              src="https://static-cdn.jtvnw.net/user-default-pictures-uv/75305d54-c7cc-40d1-bb9c-91fbe85943c7-profile_image-70x70.png"
              alt="${displayName}">
            <div class="live-badge" id="liveBadge">● EN VIVO</div>
          </div>
          <div class="hero-info">
            <div class="channel-name">${displayName}</div>
            <div class="channel-meta">
              <span class="meta-badge bot">🕷️ MuffetBot</span>
              <a href="https://twitch.tv/${data.username}" target="_blank" class="meta-badge twitch" style="text-decoration:none;">
                🎮 twitch.tv/${data.username}
              </a>
            </div>
          </div>
        </div>
      </div>`;

    // Cargar avatar real
    fetch(`https://decapi.me/twitch/avatar/${data.username}`)
      .then(r => r.text())
      .then(url => { if(url?.startsWith('http')) document.getElementById('channelAvatar').src = url; })
      .catch(()=>{});

    // Redes sociales con colores
    const socials = Object.entries(data.social_links || {})
      .filter(([k,v]) => v && k !== 'accent_color')
      .map(([k,v]) => `<a href="${v}" target="_blank" class="social-btn ${socialClasses[k]||''}">
        ${socialIcons[k]||'🔗'} ${socialLabels[k]||k}
      </a>`).join('');

    if (socials) {
      document.getElementById('socialsSection').innerHTML = `<div class="socials-row">${socials}</div>`;
    }

    // MAIN
    const commands = Object.entries(data.commands || {}).filter(([t,v]) => {
      const r = typeof v === 'object' ? v.response : v;
      return r && !r.includes('{') && t !== '!addcmd' && t !== '!delcmd';
    });
    const topViewers = data.top_viewers || [];
    const pointsConfig = data.points_config || {};
    const emoji = pointsConfig.emoji || '🏆';
    const pName = pointsConfig.name || 'puntos';

    let mainHtml = '';

    // Grid Top + primerin
    const primerinRanking = Object.entries(data.primerin_config?.ranking || {}).sort(([,a],[,b])=>b-a).slice(0,5);

    if (topViewers.length || primerinRanking.length) {
      const medals = ['🥇','🥈','🥉','4️⃣','5️⃣'];
      const maxPts = topViewers[0]?.xp || 1;

      mainHtml += `<div class="grid-2">`;

      if (topViewers.length) {
        const levels = pointsConfig.levels || [];
        mainHtml += `
          <div class="panel">
            <div class="panel-header">
              <span class="panel-title">${emoji} Top viewers</span>
              <span class="panel-badge">${pName}</span>
            </div>
            <div class="panel-body">
              <div class="top-list">
                ${topViewers.slice(0,5).map((v,i) => {
                  const level = levels.filter(l=>v.xp>=l.xp).pop();
                  const pct = Math.round((v.xp/maxPts)*100);
                  return `<div class="top-item${i===0?' first':''}">
                    <span class="top-medal">${medals[i]||`#${i+1}`}</span>
                    <div class="top-info">
                      <div class="top-name">${v.username}</div>
                      ${level?`<div class="top-level">${level.name}</div>`:''}
                    </div>
                    <div class="top-right">
                      <div class="top-pts">${v.xp} ${emoji}</div>
                      <div class="top-bar-wrap"><div class="top-bar" style="width:${pct}%;"></div></div>
                    </div>
                  </div>`;
                }).join('')}
              </div>
            </div>
          </div>`;
      }

      if (primerinRanking.length) {
        const cmd = data.primerin_config?.command || 'primerin';
        const maxWins = primerinRanking[0][1] || 1;
        mainHtml += `
          <div class="panel">
            <div class="panel-header">
              <span class="panel-title">🥇 Ranking !${cmd}</span>
              <span class="panel-badge">primeros</span>
            </div>
            <div class="panel-body">
              <div class="top-list">
                ${primerinRanking.map(([user,wins],i) => `
                  <div class="top-item${i===0?' first':''}">
                    <span class="top-medal">${medals[i]||`#${i+1}`}</span>
                    <div class="top-info">
                      <div class="top-name">${user}</div>
                      <div class="top-level">llegó primero</div>
                    </div>
                    <div class="top-right">
                      <div class="top-pts">${wins}x 🏆</div>
                      <div class="top-bar-wrap">
                        <div class="top-bar" style="width:${Math.round((wins/maxWins)*100)}%;background:linear-gradient(90deg,var(--accent-light),var(--accent-dim));"></div>
                      </div>
                    </div>
                  </div>`).join('')}
              </div>
            </div>
          </div>`;
      }

      mainHtml += `</div>`;
    }

    // Comandos
    if (commands.length) {
      mainHtml += `
        <div class="panel">
          <div class="panel-header">
            <span class="panel-title">⚡ Comandos</span>
            <span class="panel-badge">${commands.length}</span>
          </div>
          <div class="panel-body">
            <div class="cmd-search-wrap">
              <span class="cmd-search-icon">🔍</span>
              <input class="cmd-search" placeholder="Buscar comando..." oninput="filterCmds(this.value)">
            </div>
            <div class="cmd-list">
              ${commands.map(([trigger, val]) => {
                const resp = typeof val === 'object' ? val.response : val;
                return `<div class="cmd-item" data-trigger="${trigger}" data-response="${(resp||'').replace(/"/g,'')}" onclick="copyCmd('${trigger}')">
                  <span class="cmd-trigger">${trigger}</span>
                  <span class="cmd-response">${resp||''}</span>
                  <span class="cmd-copy">copiar</span>
                </div>`;
              }).join('')}
            </div>
          </div>
        </div>`;
    }

    document.getElementById('mainContent').innerHTML = mainHtml;
    document.getElementById('mainContent').style.display = 'block';
    document.getElementById('footerSection').style.display = 'block';

    // Horario
    if (data.stream_schedule) {
      const days = ['lunes','martes','miercoles','jueves','viernes','sabado','domingo'];
      const dayNames = ['Lunes','Martes','Miércoles','Jueves','Viernes','Sábado','Domingo'];
      const todayIdx = (new Date().getDay() + 6) % 7;
      const activeDays = days.filter(d => data.stream_schedule[d]?.active);
      if (activeDays.length) {
        const tz = data.stream_schedule.timezone || 'America/Santo_Domingo';
        const scheduleHtml = days.map((day,i) => {
          const d = data.stream_schedule[day];
          if (!d?.active) return '';
          const isToday = i === todayIdx;
          return `<div class="schedule-item${isToday?' today':''}">
            <div class="schedule-dot"></div>
            <span class="schedule-day-name">${dayNames[i]}${isToday?`<span class="schedule-today-badge">hoy</span>`:''}</span>
            <span class="schedule-time">⏰ ${d.start} — ${d.end}</span>
            ${d.note?`<span class="schedule-note">${d.note}</span>`:''}
          </div>`;
        }).filter(Boolean).join('');
        insertBefore(`
          <div class="panel">
            <div class="panel-header">
              <span class="panel-title">📅 Horario</span>
              <span class="panel-badge">${tz.split('/')[1]?.replace(/_/g,' ')||tz}</span>
            </div>
            <div class="panel-body"><div class="schedule-list">${scheduleHtml}</div></div>
          </div>`);
      }
    }

    // Clips
    try {
      const clipsRes = await fetch(`/api/clips/${data.username}`);
      const clips = await clipsRes.json();
      if (clips?.length) {
        insertBefore(`
          <div class="panel">
            <div class="panel-header"><span class="panel-title">🎬 Clips recientes</span></div>
            <div class="panel-body">
              <div class="media-grid">
                ${clips.map(c => `
                  <a href="${c.url}" target="_blank" class="media-card">
                    <div class="media-thumb-wrap">
                      <img class="media-thumb" src="${c.thumbnail}" alt="${c.title}" loading="lazy">
                      <div class="media-overlay"><div class="media-play">▶</div></div>
                      <div class="media-duration">${c.duration}s</div>
                    </div>
                    <div class="media-info">
                      <div class="media-title">${c.title}</div>
                      <div class="media-meta"><span>👁️ ${c.views?.toLocaleString()||0}</span></div>
                    </div>
                  </a>`).join('')}
              </div>
            </div>
          </div>`);
      }
    } catch(e) {}

    // YouTube
    if (data.youtube_channel_id) {
      try {
        const rssRes = await fetch(`/api/youtube-videos/${data.youtube_channel_id}`);
        const videos = await rssRes.json();
        if (videos?.length) {
          insertBefore(`
            <div class="panel">
              <div class="panel-header"><span class="panel-title">📺 Últimos videos</span></div>
              <div class="panel-body">
                <div class="media-grid">
                  ${videos.map(v => `
                    <a href="${v.url}" target="_blank" class="media-card">
                      <div class="media-thumb-wrap">
                        <img class="media-thumb" src="${v.thumb}" alt="${v.title}" loading="lazy">
                        <div class="media-overlay"><div class="media-play">▶</div></div>
                      </div>
                      <div class="media-info">
                        <div class="media-title">${v.title}</div>
                        <div class="media-meta">${v.date}</div>
                      </div>
                    </a>`).join('')}
                </div>
              </div>
            </div>`);
        }
      } catch(e) {}
    }

  } catch(err) {
    showError('Error al cargar el canal');
  }
}

function insertBefore(html) {
  const footer = document.getElementById('footerSection');
  const div = document.createElement('div');
  div.className = 'main';
  div.style.paddingTop = '0';
  div.style.paddingBottom = '0';
  div.innerHTML = html;
  footer.parentNode.insertBefore(div, footer);
}

function showError(msg) {
  document.getElementById('heroSection').innerHTML = `
    <div class="error-card">
      <div style="font-size:48px;margin-bottom:16px;">🕷️</div>
      <div style="font-size:18px;font-weight:700;margin-bottom:8px;">Canal no encontrado</div>
      <div style="font-size:13px;color:var(--text-dim);line-height:1.6;">${msg}</div>
    </div>`;
}

loadCanal();
</script>
</body>
</html>
