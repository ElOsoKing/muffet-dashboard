<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MuffetBot — Canal</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=VT323&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --purple:#9147ff;--purple-dim:rgba(145,71,255,0.12);--purple-border:rgba(145,71,255,0.25);
  --purple-light:#b388ff;--green:#40d090;--yellow:#f0c060;--pink:#e05a7a;
  --bg:#0d0d0f;--bg2:#141416;--bg3:#1a1a1e;--bg4:#1f1f26;
  --text:#e8e8f0;--text-dim:#6b6b80;--text-muted:#3a3a4a;
  --sans:'Inter',sans-serif;--display:'VT323',monospace;
  --radius:12px;--radius-sm:8px;
}
html,body{width:100%;min-height:100%;background:var(--bg);font-family:var(--sans);color:var(--text);}

/* Background */
.bg-mesh{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse at 20% 20%,rgba(145,71,255,0.06) 0%,transparent 50%),
             radial-gradient(ellipse at 80% 80%,rgba(145,71,255,0.04) 0%,transparent 50%);
}

/* Nav */
.nav{position:sticky;top:0;z-index:100;backdrop-filter:blur(12px);background:rgba(13,13,15,0.8);border-bottom:1px solid rgba(255,255,255,0.04);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;}
.nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
.nav-logo img{width:22px;height:22px;image-rendering:pixelated;filter:drop-shadow(0 0 6px rgba(145,71,255,0.5));}
.nav-logo-text{font-size:14px;font-weight:600;color:var(--text);}
.nav-btn{font-size:12px;font-weight:500;padding:7px 16px;border-radius:20px;cursor:pointer;text-decoration:none;transition:all 0.15s;background:var(--purple);color:white;border:none;}
.nav-btn:hover{opacity:0.85;}

/* Hero */
.hero{position:relative;z-index:1;padding:48px 24px 0;max-width:780px;margin:0 auto;}
.hero-inner{display:flex;align-items:center;gap:28px;}
.avatar-wrap{position:relative;flex-shrink:0;}
.channel-avatar{width:96px;height:96px;border-radius:50%;border:3px solid var(--purple-border);background:var(--bg2);box-shadow:0 0 24px rgba(145,71,255,0.15);}
.avatar-live{position:absolute;bottom:4px;right:4px;width:16px;height:16px;background:#e05a7a;border-radius:50%;border:2px solid var(--bg);display:none;}
.hero-info{flex:1;}
.channel-name{font-size:28px;font-weight:700;color:var(--text);letter-spacing:-0.5px;line-height:1.1;}
.channel-badges{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
.badge{display:inline-flex;align-items:center;gap:5px;border-radius:20px;padding:3px 10px;font-size:11px;font-weight:500;}
.badge-bot{background:var(--purple-dim);border:1px solid var(--purple-border);color:var(--purple-light);}
.badge-twitch{background:rgba(145,71,255,0.08);border:1px solid rgba(145,71,255,0.2);color:var(--purple-light);}
.hero-twitch{display:inline-flex;align-items:center;gap:6px;margin-top:10px;font-size:13px;color:var(--text-dim);text-decoration:none;transition:color 0.15s;}
.hero-twitch:hover{color:var(--purple-light);}

/* Main */
.main{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:32px 24px 80px;}

/* Socials */
.socials{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:28px;}
.social-link{display:flex;align-items:center;gap:8px;background:var(--bg2);border:1px solid rgba(255,255,255,0.07);border-radius:var(--radius-sm);padding:9px 16px;font-size:13px;font-weight:500;color:var(--text-dim);text-decoration:none;transition:all 0.15s;}
.social-link:hover{border-color:var(--purple-border);color:var(--text);transform:translateY(-1px);}

/* Grid layout */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;}
@media(max-width:600px){.grid{grid-template-columns:1fr;}}

/* Panel */
.panel{background:var(--bg2);border:1px solid rgba(255,255,255,0.06);border-radius:var(--radius);overflow:hidden;margin-bottom:16px;}
.panel-header{padding:14px 20px;border-bottom:1px solid rgba(255,255,255,0.05);display:flex;align-items:center;justify-content:space-between;}
.panel-title{font-size:13px;font-weight:600;color:var(--text);}
.panel-count{font-size:11px;color:var(--text-muted);background:var(--bg3);padding:2px 8px;border-radius:10px;}
.panel-body{padding:16px 20px;}

/* Comandos */
.commands-list{display:flex;flex-direction:column;gap:4px;}
.cmd-item{display:flex;align-items:center;gap:12px;padding:9px 12px;background:var(--bg3);border-radius:var(--radius-sm);cursor:pointer;transition:all 0.15s;border:1px solid transparent;}
.cmd-item:hover{border-color:var(--purple-border);background:var(--bg4);}
.cmd-trigger{font-size:12px;font-weight:600;color:var(--purple-light);font-family:monospace;min-width:90px;}
.cmd-response{font-size:12px;color:var(--text-dim);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.cmd-copy{font-size:10px;color:var(--text-muted);flex-shrink:0;padding:2px 8px;border:1px solid rgba(255,255,255,0.06);border-radius:4px;opacity:0;transition:opacity 0.15s;}
.cmd-item:hover .cmd-copy{opacity:1;color:var(--purple-light);border-color:var(--purple-border);}

/* Top viewers */
.top-list{display:flex;flex-direction:column;gap:6px;}
.top-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg3);border-radius:var(--radius-sm);}
.top-item:first-child{background:rgba(240,192,96,0.06);border:1px solid rgba(240,192,96,0.15);}
.top-medal{font-size:16px;width:24px;text-align:center;flex-shrink:0;}
.top-name{font-size:13px;font-weight:500;color:var(--text);flex:1;}
.top-level{font-size:10px;color:var(--text-muted);}
.top-points{font-size:12px;font-weight:600;color:var(--yellow);}

/* Horario */
.schedule-grid{display:flex;flex-direction:column;gap:6px;}
.schedule-day{display:flex;align-items:center;gap:12px;padding:8px 12px;background:var(--bg3);border-radius:var(--radius-sm);}
.schedule-day.today{background:var(--purple-dim);border:1px solid var(--purple-border);}
.schedule-day-name{font-size:12px;font-weight:500;min-width:90px;}
.schedule-time{font-size:12px;color:var(--text-dim);}
.schedule-note{font-size:11px;color:var(--text-muted);margin-left:auto;}

/* Videos y Clips */
.media-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
@media(max-width:600px){.media-grid{grid-template-columns:repeat(2,1fr);}}
.media-card{background:var(--bg3);border:1px solid rgba(255,255,255,0.06);border-radius:var(--radius-sm);overflow:hidden;text-decoration:none;transition:all 0.15s;}
.media-card:hover{border-color:var(--purple-border);transform:translateY(-2px);}
.media-thumb{width:100%;aspect-ratio:16/9;object-fit:cover;background:var(--bg4);}
.media-info{padding:10px 12px;}
.media-title{font-size:12px;font-weight:500;color:var(--text);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.media-meta{font-size:10px;color:var(--text-muted);margin-top:4px;}
.clip-duration{position:absolute;top:8px;right:8px;background:rgba(0,0,0,0.75);border-radius:4px;padding:2px 6px;font-size:10px;color:white;font-weight:500;}
.media-card-wrap{position:relative;}

/* Footer */
.footer{position:relative;z-index:1;text-align:center;padding:0 24px 48px;max-width:780px;margin:0 auto;}
.footer-text{font-size:12px;color:var(--text-muted);margin-bottom:14px;}
.footer-links{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
.footer-link{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:20px;text-decoration:none;font-size:12px;font-weight:500;transition:all 0.15s;}
.footer-link:hover{transform:translateY(-1px);}
.footer-link-discord{background:rgba(88,101,242,0.1);border:1px solid rgba(88,101,242,0.2);color:#7289da;}
.footer-link-kofi{background:rgba(255,94,91,0.1);border:1px solid rgba(255,94,91,0.2);color:#ff5e5b;}

/* Loading / error */
.loading-hero{display:flex;align-items:center;gap:24px;padding:48px 24px;max-width:780px;margin:0 auto;}
.skeleton{background:linear-gradient(90deg,var(--bg2) 25%,var(--bg3) 50%,var(--bg2) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:var(--radius-sm);}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.error-card{max-width:400px;margin:80px auto;background:var(--bg2);border:1px solid rgba(224,90,122,0.2);border-radius:var(--radius);padding:40px;text-align:center;}
.error-icon{font-size:40px;margin-bottom:12px;}
.error-title{font-size:18px;font-weight:600;margin-bottom:8px;}
.error-desc{font-size:13px;color:var(--text-dim);}

/* Toast */
.toast{position:fixed;bottom:24px;right:24px;background:var(--bg2);border:1px solid rgba(64,208,144,0.3);border-radius:var(--radius-sm);color:var(--green);font-size:13px;font-weight:500;padding:10px 16px;transform:translateY(20px);opacity:0;transition:all 0.25s;z-index:200;}
.toast.show{transform:translateY(0);opacity:1;}

@media(max-width:600px){
  .hero{padding:32px 16px 0;}
  .hero-inner{gap:18px;}
  .channel-avatar{width:72px;height:72px;}
  .channel-name{font-size:22px;}
  .main{padding:24px 16px 60px;}
}
</style>
</head>
<body>
<div class="bg-mesh"></div>

<nav class="nav">
  <a href="/" class="nav-logo">
    <img src="data:image/webp;base64,UklGRjYBAABXRUJQVlA4TCkBAAAvM0AREDegqG0jNlcE68brAB5ZgMn+YQSTR9jRKGjbhgmCPh5DPaLzHwCAFWFnf254HyAEcBs2EoWjEAqiIAqmIP4cmvaXPIGI/k+A9tZH64+/Ajx+8xjgFM8Z7zzD9gxPe8zWY9/h8fBxPL5AHvNawGOdehqge7D18QRA26RtgWuaXS7LI/cATV9T4JrkkVzC85E2L3BKmyZtm3SjS77eIYCWQmkBdIEEtLS0gD6fkES36IcnBC1cBgZfho2NzT0Ja9n2WiQXAIkk8FoGSQlwhBZJSmAtSCSJlhMCSYqYZa9BkSTQkW0UZuwZoujzr4AozMTODFGAQ7RoM/ZsRMsZgYSYAZhBSKBDkoiEkTBS0McTKRKShEQv4X8gCSSQxCXbDz88AJIEVwAA" alt="Muffet">

  </a>

</nav>

<div id="heroSection"></div>
<div id="mainContent" class="main" style="display:none;"></div>
<div id="footerSection" class="footer" style="display:none;">
  <div class="footer-text">Impulsado por <strong style="color:var(--purple-light);">MuffetBot</strong> — El bot de Twitch con personalidad 🕷️</div>
  <div class="footer-links">
    <a href="https://discord.gg/6DCDS3Sfet" target="_blank" class="footer-link footer-link-discord">💬 Servidor de MuffetBot</a>
    <a href="https://ko-fi.com/muffetbot" target="_blank" class="footer-link footer-link-kofi">☕ Apoya a MuffetBot</a>
  </div>
</div>

<div class="toast" id="toast">✓ Copiado</div>

<script>
const socialIcons  = { twitch:'🎮', youtube:'📺', tiktok:'🎵', twitter:'🐦', instagram:'📸', discord:'💬' };
const socialLabels = { twitch:'Twitch', youtube:'YouTube', tiktok:'TikTok', twitter:'Twitter/X', instagram:'Instagram', discord:'Discord' };

function copyCmd(trigger) {
  navigator.clipboard.writeText(trigger).catch(() => {});
  const t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function setAccent(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  document.documentElement.style.setProperty('--purple', hex);
  document.documentElement.style.setProperty('--purple-dim', `rgba(${r},${g},${b},0.12)`);
  document.documentElement.style.setProperty('--purple-border', `rgba(${r},${g},${b},0.3)`);
  document.documentElement.style.setProperty('--purple-light', `rgb(${Math.min(255,r+50)},${Math.min(255,g+50)},${Math.min(255,b+50)})`);
}

async function loadCanal() {
  const username = window.location.pathname.split('/canal/')[1];
  if (!username) { showError('Canal no especificado'); return; }

  // Skeleton loading
  document.getElementById('heroSection').innerHTML = `
    <div class="loading-hero">
      <div class="skeleton" style="width:96px;height:96px;border-radius:50%;flex-shrink:0;"></div>
      <div style="flex:1;display:flex;flex-direction:column;gap:10px;">
        <div class="skeleton" style="height:28px;width:200px;border-radius:6px;"></div>
        <div class="skeleton" style="height:20px;width:140px;border-radius:20px;"></div>
        <div class="skeleton" style="height:16px;width:160px;border-radius:4px;"></div>
      </div>
    </div>`;

  try {
    const res = await fetch(`/api/canal/${username}`);
    if (!res.ok) { showError(`El canal "${username}" no existe o no está activo en MuffetBot`); return; }
    const data = await res.json();

    // Aplicar color del streamer
    const accent = data.social_links?.accent_color || '#9147ff';
    setAccent(accent);

    const displayName = data.public_name || data.username;
    document.title = `${displayName} — MuffetBot`;

    // Redes sociales
    const socials = Object.entries(data.social_links || {})
      .filter(([k,v]) => v && k !== 'accent_color')
      .map(([k,v]) => `<a href="${v}" target="_blank" class="social-link">${socialIcons[k]||'🔗'} ${socialLabels[k]||k}</a>`)
      .join('');

    // Hero
    document.getElementById('heroSection').innerHTML = `
      <div class="hero">
        <div class="hero-inner">
          <div class="avatar-wrap">
            <img class="channel-avatar" id="channelAvatar"
              src="https://static-cdn.jtvnw.net/user-default-pictures-uv/75305d54-c7cc-40d1-bb9c-91fbe85943c7-profile_image-70x70.png">
          </div>
          <div class="hero-info">
            <div class="channel-name">${displayName}</div>
            <div class="channel-badges">
              <span class="badge badge-bot">🕷️ MuffetBot</span>
            </div>
            <a href="https://twitch.tv/${data.username}" target="_blank" class="hero-twitch">
              🎮 twitch.tv/${data.username}
            </a>
          </div>
        </div>
        ${socials ? `<div class="socials" style="margin-top:24px;">${socials}</div>` : '<div style="height:24px;"></div>'}
      </div>`;

    // Cargar avatar
    fetch(`https://decapi.me/twitch/avatar/${data.username}`)
      .then(r => r.text())
      .then(url => { if(url.startsWith('http')) document.getElementById('channelAvatar').src = url; })
      .catch(() => {});

    // Main content
    const commands = Object.entries(data.commands || {});
    const topViewers = data.top_viewers || [];
    const pointsConfig = data.points_config || {};

    let mainHtml = '';

    // Grid — Top viewers + comandos cortos
    const hasTop = topViewers.length > 0;
    if (hasTop) {
      const medals = ['🥇','🥈','🥉','4️⃣','5️⃣'];
      const emoji = pointsConfig.emoji || '🏆';
      const pName = pointsConfig.name || 'puntos';
      mainHtml += `
        <div class="panel">
          <div class="panel-header">
            <span class="panel-title">${emoji} Top viewers</span>
            <span class="panel-count">${pName}</span>
          </div>
          <div class="panel-body">
            <div class="top-list">
              ${topViewers.map((v, i) => {
                const levels = pointsConfig.levels || [];
                const level = levels.filter(l => v.xp >= l.xp).pop();
                return `<div class="top-item">
                  <span class="top-medal">${medals[i]||`#${i+1}`}</span>
                  <div style="flex:1;">
                    <div class="top-name">${v.username}</div>
                    ${level ? `<div class="top-level">${level.name}</div>` : ''}
                  </div>
                  <span class="top-points">${v.xp} ${emoji}</span>
                </div>`;
              }).join('')}
            </div>
          </div>
        </div>`;
    }

    // Comandos
    mainHtml += `
      <div class="panel">
        <div class="panel-header">
          <span class="panel-title">⚡ Comandos</span>
          <span class="panel-count">${commands.length}</span>
        </div>
        <div class="panel-body">
          ${commands.length ? `
            <div class="commands-list">
              ${commands.map(([trigger, response]) => {
                const resp = typeof response === 'object' ? response.response : response;
                return `<div class="cmd-item" onclick="copyCmd('${trigger}')">
                  <span class="cmd-trigger">${trigger}</span>
                  <span class="cmd-response">${resp}</span>
                  <span class="cmd-copy">copiar</span>
                </div>`;
              }).join('')}
            </div>` : `<div style="text-align:center;padding:20px;color:var(--text-muted);font-size:13px;">No hay comandos configurados aún</div>`}
        </div>
      </div>`;

    document.getElementById('mainContent').innerHTML = mainHtml;
    document.getElementById('mainContent').style.display = 'block';
    document.getElementById('footerSection').style.display = 'block';

    // Horario
    if (data.stream_schedule) {
      const days = ['lunes','martes','miercoles','jueves','viernes','sabado','domingo'];
      const dayNames = ['Lunes','Martes','Miércoles','Jueves','Viernes','Sábado','Domingo'];
      const todayIdx = (new Date().getDay() + 6) % 7;
      const activeDays = days.filter(d => data.stream_schedule[d]?.active);
      if (activeDays.length) {
        const tz = data.stream_schedule.timezone || 'America/Santo_Domingo';
        const scheduleHtml = days.map((day, i) => {
          const d = data.stream_schedule[day];
          if (!d?.active) return '';
          const isToday = i === todayIdx;
          return `<div class="schedule-day${isToday?' today':''}">
            <span class="schedule-day-name">${isToday?'🔴 ':''}<strong>${dayNames[i]}</strong></span>
            <span class="schedule-time">⏰ ${d.start} — ${d.end}</span>
            ${d.note ? `<span class="schedule-note">${d.note}</span>` : ''}
          </div>`;
        }).filter(Boolean).join('');

        insertBefore(`
          <div class="panel">
            <div class="panel-header">
              <span class="panel-title">📅 Horario</span>
              <span class="panel-count" style="font-size:11px;">${tz.split('/')[1]?.replace('_',' ')||tz}</span>
            </div>
            <div class="panel-body"><div class="schedule-grid">${scheduleHtml}</div></div>
          </div>`);
      }
    }

    // Clips
    try {
      const clipsRes = await fetch(`/api/clips/${data.username}`);
      const clips = await clipsRes.json();
      if (clips?.length) {
        insertBefore(`
          <div class="panel">
            <div class="panel-header"><span class="panel-title">🎬 Clips recientes</span></div>
            <div class="panel-body">
              <div class="media-grid">
                ${clips.map(c => `
                  <div class="media-card-wrap">
                    <a href="${c.url}" target="_blank" class="media-card">
                      <img class="media-thumb" src="${c.thumbnail}" alt="${c.title}" loading="lazy">
                      <div class="clip-duration">${c.duration}s</div>
                      <div class="media-info">
                        <div class="media-title">${c.title}</div>
                        <div class="media-meta">👁️ ${c.views.toLocaleString()} vistas</div>
                      </div>
                    </a>
                  </div>`).join('')}
              </div>
            </div>
          </div>`);
      }
    } catch(e) {}

    // YouTube
    if (data.youtube_channel_id) {
      try {
        const rssRes = await fetch(`/api/youtube-videos/${data.youtube_channel_id}`);
        const videos = await rssRes.json();
        if (videos?.length) {
          insertBefore(`
            <div class="panel">
              <div class="panel-header"><span class="panel-title">📺 Últimos videos</span></div>
              <div class="panel-body">
                <div class="media-grid">
                  ${videos.map(v => `
                    <a href="${v.url}" target="_blank" class="media-card">
                      <img class="media-thumb" src="${v.thumb}" alt="${v.title}" loading="lazy">
                      <div class="media-info">
                        <div class="media-title">${v.title}</div>
                        <div class="media-meta">${v.date}</div>
                      </div>
                    </a>`).join('')}
                </div>
              </div>
            </div>`);
        }
      } catch(e) {}
    }

  } catch(err) {
    showError('Error al cargar el canal');
  }
}

function insertBefore(html) {
  const footer = document.getElementById('footerSection');
  const div = document.createElement('div');
  div.innerHTML = html;
  footer.parentNode.insertBefore(div, footer);
}

function showError(msg) {
  document.getElementById('heroSection').innerHTML = `
    <div class="error-card">
      <div class="error-icon">🕷️</div>
      <div class="error-title">Canal no encontrado</div>
      <div class="error-desc">${msg}</div>
    </div>`;
}

loadCanal();
</script>
</body>
</html>
