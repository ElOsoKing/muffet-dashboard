<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Shoutout Overlay</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;background:transparent;overflow:hidden;}

.overlay{
  position:fixed;inset:0;
  border-radius:16px;overflow:hidden;
  transform:scale(0.9) translateY(20px);opacity:0;
  transition:transform 0.55s cubic-bezier(0.34,1.56,0.64,1),opacity 0.4s;
  box-shadow:0 0 0 2px rgba(145,71,255,0.6),0 16px 60px rgba(0,0,0,0.9);
}
.overlay::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;z-index:10;
  background:linear-gradient(90deg,transparent,#9147ff,#b388ff,#e05a7a,transparent);
}
.overlay.show{transform:scale(1) translateY(0);opacity:1;}

/* Tapar barra de info de Twitch arriba */
.top-cover{
  position:absolute;top:0;left:0;right:0;height:50px;
  background:#000;z-index:5;
}
/* Tapar controles de Twitch abajo */
.bottom-cover{
  position:absolute;bottom:0;left:0;right:0;height:50px;
  background:#000;z-index:5;
}

/* Iframe del clip */
.clip-iframe{
  position:absolute;
  top:-50px;left:0;
  width:100%;height:calc(100% + 100px);
  border:none;
}

/* Barra de progreso abajo */
.progress-bar{
  position:absolute;bottom:0;left:0;right:0;height:4px;
  background:rgba(0,0,0,0.5);z-index:10;
}
.progress-fill{
  height:100%;
  background:linear-gradient(90deg,#9147ff,#b388ff,#e05a7a);
  width:0%;transition:width linear;
}

/* Username flotante abajo izq */
.username-badge{
  position:absolute;bottom:8px;left:12px;z-index:10;
  display:flex;align-items:center;gap:8px;
  background:rgba(0,0,0,0.75);border:1px solid rgba(145,71,255,0.4);
  border-radius:20px;padding:5px 14px 5px 6px;
  backdrop-filter:blur(8px);
  transform:translateY(60px);opacity:0;
  transition:transform 0.5s 0.3s cubic-bezier(0.34,1.56,0.64,1),opacity 0.4s 0.3s;
}
.overlay.show .username-badge{transform:translateY(0);opacity:1;}
.user-avatar{width:28px;height:28px;border-radius:50%;border:2px solid #9147ff;object-fit:cover;background:#1a1a1e;}
.user-name{font-size:13px;font-weight:700;color:#fff;font-family:'Inter',sans-serif;}
.so-tag{font-size:9px;font-weight:600;color:#9147ff;text-transform:uppercase;letter-spacing:1px;display:block;}

/* Confetti */
.confetti-wrap{position:absolute;inset:0;pointer-events:none;overflow:hidden;z-index:8;}
.c{position:absolute;width:7px;height:7px;border-radius:2px;animation:fall 2.5s ease-in forwards;top:-10px;}
@keyframes fall{0%{opacity:1;transform:translateY(0) rotate(0deg);}100%{opacity:0;transform:translateY(110vh) rotate(600deg);}}
</style>
</head>
<body>
<div class="overlay" id="overlay">
  <div class="confetti-wrap" id="confetti"></div>
  <div class="top-cover"></div>
  <div id="clipContainer"></div>
  <div class="bottom-cover"></div>
  <div class="username-badge">
    <img class="user-avatar" id="userAvatar" src="" alt="">
    <div>
      <span class="so-tag">🕷️ shoutout</span>
      <span class="user-name" id="userName">—</span>
    </div>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
</div>

<script>
const DOMAIN = window.location.hostname;
const username = window.location.pathname.split('/').pop();
let lastTimestamp = 0;
let hideTimeout = null;

function spawnConfetti() {
  const colors = ['#9147ff','#b388ff','#f0c060','#40d090','#e05a7a','#58a6ff'];
  const wrap = document.getElementById('confetti');
  wrap.innerHTML = '';
  for (let i = 0; i < 28; i++) {
    const el = document.createElement('div');
    el.className = 'c';
    el.style.left = Math.random() * 100 + '%';
    el.style.background = colors[Math.floor(Math.random() * colors.length)];
    el.style.animationDelay = Math.random() * 1.5 + 's';
    el.style.animationDuration = (1.8 + Math.random() * 1.2) + 's';
    wrap.appendChild(el);
  }
}

function showShoutout(data) {
  // Duración real del clip + 2s de margen, máximo 90s
  const duration = Math.min(((data.clip_duration || 30) * 1000) + 2000, 90000);

  document.getElementById('userName').textContent = data.display_name || data.username;

  fetch(`https://decapi.me/twitch/avatar/${data.username}`)
    .then(r => r.text())
    .then(url => { if(url?.startsWith('http')) document.getElementById('userAvatar').src = url; })
    .catch(() => {});

  const container = document.getElementById('clipContainer');
  if (data.clip_id) {
    container.innerHTML = `<iframe id="clipIframe" class="clip-iframe"
      src="https://clips.twitch.tv/embed?clip=${data.clip_id}&parent=${DOMAIN}&autoplay=true&muted=true"
      allowfullscreen allow="autoplay; fullscreen" frameborder="0"></iframe>`;

    // Simular click para forzar reproducción
    setTimeout(() => {
      const iframe = document.getElementById('clipIframe');
      if (!iframe) return;
      iframe.focus();
      const rect = iframe.getBoundingClientRect();
      iframe.dispatchEvent(new MouseEvent('click', { bubbles:true, clientX: rect.left + rect.width/2, clientY: rect.top + rect.height/2 }));
    }, 1000);
  } else if (data.clip_thumbnail) {
    container.innerHTML = `<img style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;" src="${data.clip_thumbnail}">`;
  }

  spawnConfetti();
  document.getElementById('overlay').classList.add('show');

  const fill = document.getElementById('progressFill');
  fill.style.transition = 'none';
  fill.style.width = '0%';
  setTimeout(() => {
    fill.style.transition = `width ${duration}ms linear`;
    fill.style.width = '100%';
  }, 100);

  if (hideTimeout) clearTimeout(hideTimeout);
  hideTimeout = setTimeout(hideOverlay, duration);
}

function hideOverlay() {
  document.getElementById('overlay').classList.remove('show');
  const fill = document.getElementById('progressFill');
  fill.style.transition = 'none';
  fill.style.width = '0%';
  setTimeout(() => { document.getElementById('clipContainer').innerHTML = ''; }, 700);
  if (hideTimeout) { clearTimeout(hideTimeout); hideTimeout = null; }
}

// Detectar cuando el clip de Twitch termina via postMessage
window.addEventListener('message', (e) => {
  try {
    const data = typeof e.data === 'string' ? JSON.parse(e.data) : e.data;
    if (data?.event === 'ended' || data?.type === 'ended') {
      setTimeout(hideOverlay, 1500); // pequeña pausa antes de ocultar
    }
  } catch(e) {}
});

async function poll() {
  try {
    const res = await fetch(`/api/shoutout/${username}`);
    const data = await res.json();
    if (data?.timestamp && data.timestamp !== lastTimestamp) {
      lastTimestamp = data.timestamp;
      showShoutout(data);
    }
  } catch(e) {}
}

setInterval(poll, 2000);
poll();
</script>
</body>
</html>
