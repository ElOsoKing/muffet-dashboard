<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Shoutout Overlay</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;background:transparent;overflow:hidden;}

#overlay{
  position:fixed;inset:0;background:#000;
  border-radius:16px;overflow:hidden;display:none;
  box-shadow:0 0 0 2px rgba(145,71,255,0.6),0 16px 60px rgba(0,0,0,0.9);
}
#overlay::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;z-index:10;
  background:linear-gradient(90deg,transparent,#9147ff,#b388ff,#e05a7a,transparent);
}

/* Cubrir UI de Twitch */
.top-cover{position:absolute;top:0;left:0;right:0;height:50px;background:#000;z-index:5;}
.bottom-cover{position:absolute;bottom:0;left:0;right:0;height:50px;background:#000;z-index:5;}
#clipIframe{
  position:absolute;top:-50px;left:0;
  width:100%;height:calc(100% + 100px);border:none;
}

/* Badge */
#badge{
  position:absolute;bottom:8px;left:12px;z-index:10;
  display:flex;align-items:center;gap:8px;
  background:rgba(0,0,0,0.85);border:1px solid rgba(145,71,255,0.5);
  border-radius:20px;padding:5px 14px 5px 6px;backdrop-filter:blur(8px);
}
#badgeAvatar{width:28px;height:28px;border-radius:50%;border:2px solid #9147ff;object-fit:cover;background:#1a1a1e;}
#badgeTag{font-size:9px;font-weight:700;color:#9147ff;text-transform:uppercase;letter-spacing:1px;display:block;font-family:'Inter',sans-serif;}
#badgeName{font-size:13px;font-weight:700;color:#fff;font-family:'Inter',sans-serif;}

/* Barra progreso */
#progressBar{position:absolute;bottom:0;left:0;right:0;height:4px;background:rgba(0,0,0,0.5);z-index:10;}
#progressFill{height:100%;background:linear-gradient(90deg,#9147ff,#b388ff,#e05a7a);width:0%;transition:width linear;}

/* Confetti */
.confetti-wrap{position:absolute;inset:0;pointer-events:none;overflow:hidden;z-index:8;}
.c{position:absolute;width:7px;height:7px;border-radius:2px;animation:fall 2.5s ease-in forwards;top:-10px;}
@keyframes fall{0%{opacity:1;transform:translateY(0) rotate(0deg);}100%{opacity:0;transform:translateY(110vh) rotate(600deg);}}
</style>
</head>
<body>

<div id="overlay">
  <div class="confetti-wrap" id="confetti"></div>
  <iframe id="clipIframe" frameborder="0" allowfullscreen allow="autoplay; fullscreen"></iframe>
  <div class="top-cover"></div>
  <div class="bottom-cover"></div>
  <div id="badge">
    <img id="badgeAvatar" src="" alt="">
    <div>
      <span id="badgeTag">🕷️ shoutout</span>
      <span id="badgeName">—</span>
    </div>
  </div>
  <div id="progressBar"><div id="progressFill"></div></div>
</div>

<script>
const DOMAIN = window.location.hostname;
const channelName = window.location.pathname.split('/').pop().toLowerCase();
let hideTimeout = null;

function spawnConfetti() {
  const colors = ['#9147ff','#b388ff','#f0c060','#40d090','#e05a7a','#58a6ff'];
  const wrap = document.getElementById('confetti');
  wrap.innerHTML = '';
  for (let i = 0; i < 30; i++) {
    const el = document.createElement('div');
    el.className = 'c';
    el.style.left = Math.random() * 100 + '%';
    el.style.background = colors[Math.floor(Math.random() * colors.length)];
    el.style.animationDelay = Math.random() * 1.5 + 's';
    el.style.animationDuration = (1.8 + Math.random() * 1.2) + 's';
    wrap.appendChild(el);
  }
}

function showShoutout(user, clip) {
  const duration = clip ? Math.min((clip.duration * 1000) + 2000, 90000) : 10000;

  document.getElementById('badgeName').textContent = user.display_name || user.login;
  fetch(`https://decapi.me/twitch/avatar/${user.login}`)
    .then(r => r.text())
    .then(url => { if (url?.startsWith('http')) document.getElementById('badgeAvatar').src = url; })
    .catch(() => {});

  // 1. Hacer visible el overlay PRIMERO
  const overlay = document.getElementById('overlay');
  overlay.style.display = 'block';

  // 2. Forzar reflow — obliga al navegador a registrar que el overlay ya es visible
  void overlay.offsetWidth;

  // 3. Inyectar iframe DESPUÉS del reflow con pequeño delay
  setTimeout(() => {
    if (clip) {
      document.getElementById('clipIframe').src =
        `https://clips.twitch.tv/embed?clip=${clip.id}&parent=${DOMAIN}&autoplay=true&muted=false`;
    }

    spawnConfetti();

    const fill = document.getElementById('progressFill');
    fill.style.transition = 'none';
    fill.style.width = '0%';
    setTimeout(() => {
      fill.style.transition = `width ${duration}ms linear`;
      fill.style.width = '100%';
    }, 50);

  }, 100);

  if (hideTimeout) clearTimeout(hideTimeout);
  hideTimeout = setTimeout(hideOverlay, duration + 100);
}

function hideOverlay() {
  document.getElementById('overlay').style.display = 'none';
  document.getElementById('clipIframe').src = '';
  const fill = document.getElementById('progressFill');
  fill.style.transition = 'none';
  fill.style.width = '0%';
  if (hideTimeout) { clearTimeout(hideTimeout); hideTimeout = null; }
}

async function handleSo(targetUser) {
  try {
    const res = await fetch(`/api/shoutout-clips/${targetUser}`);
    const data = await res.json();
    if (data?.user) showShoutout(data.user, data.clip);
  } catch(e) { console.error('[!so]', e); }
}

function connectIRC() {
  const ws = new WebSocket('wss://irc-ws.chat.twitch.tv:443');

  ws.onopen = () => {
    ws.send('CAP REQ :twitch.tv/membership twitch.tv/tags twitch.tv/commands');
    ws.send(`NICK justinfan${Math.floor(Math.random() * 99999)}`);
    ws.send(`JOIN #${channelName}`);
  };

  ws.onmessage = (e) => {
    const msg = e.data;
    if (msg.startsWith('PING')) { ws.send('PONG :tmi.twitch.tv'); return; }
    if (!msg.includes('PRIVMSG')) return;
    const badgesMatch = msg.match(/badges=([^;]*)/);
    const badges = badgesMatch ? badgesMatch[1] : '';
    const isMod = badges.includes('moderator') || badges.includes('broadcaster');
    if (!isMod) return;
    const msgMatch = msg.match(/PRIVMSG #\w+ :(.+)/);
    if (!msgMatch) return;
    const text = msgMatch[1].trim().toLowerCase();
    if (text.startsWith('!so ')) {
      const target = text.slice(4).replace('@', '').trim();
      if (target) handleSo(target);
    }
  };

  ws.onclose = () => setTimeout(connectIRC, 5000);
  ws.onerror = () => ws.close();
}

connectIRC();
</script>
</body>
</html>
