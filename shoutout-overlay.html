<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Shoutout Overlay</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:1920px;height:1080px;background:transparent;overflow:hidden;}

/* Contenedor 1920x1080 */
#scene{position:fixed;inset:0;pointer-events:none;}

/* Tarjeta posicionable */
#overlay{
  position:absolute;
  background:#000;border-radius:16px;overflow:visible;
  opacity:0.001;pointer-events:none;
  transition:opacity 0.3s ease;
}
#overlay.show{opacity:var(--overlay-opacity,1);pointer-events:auto;}

#clipVideo{
  position:absolute;inset:0;width:100%;height:100%;
  object-fit:cover;background:#000;border:none;z-index:1;
}
#clipIframe{
  position:absolute;inset:0;width:100%;height:100%;border:none;z-index:1;
}

/* Layout de la tarjeta: título arriba, clip en medio, info abajo */
#overlay{display:flex;flex-direction:column;}

/* Barra superior — título */
#titleBar{
  flex-shrink:0;
  background:rgba(0,0,0,0.92);
  backdrop-filter:blur(12px);
  padding:10px 16px;
  border-bottom:2px solid var(--overlay-accent,#9147ff);
  display:none;
  position:relative;z-index:40;
}
#soTitle{
  font-size:17px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--overlay-accent,#9147ff);
  font-family:var(--overlay-font,'Inter'),sans-serif;
  text-shadow:0 0 12px var(--overlay-accent,#9147ff);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}

/* Clip — ocupa todo el espacio disponible */
#clipZone{
  flex:1;position:relative;overflow:hidden;background:#000;z-index:10;
}

/* Barra inferior — info del streamer */
#infoPanel{
  flex-shrink:0;
  background:rgba(0,0,0,0.92);
  backdrop-filter:blur(12px);
  padding:12px 18px;
  border-top:1px solid rgba(255,255,255,0.08);
  position:relative;z-index:40;
}
#badgeCard{display:flex;align-items:center;gap:12px;}
#badgeRow{display:flex;align-items:center;gap:12px;flex:1;}
#avatarWrap{position:relative;flex-shrink:0;}
#badgeAvatar{
  width:52px;height:52px;border-radius:50%;object-fit:cover;
  border:2px solid var(--overlay-accent,#9147ff);
  box-shadow:0 0 12px rgba(145,71,255,0.4);
  display:none;
}
#avatarRing{
  position:absolute;inset:-3px;border-radius:50%;
  border:2px solid var(--overlay-accent,#9147ff);
  opacity:0.4;animation:spin 3s linear infinite;display:none;
}
@keyframes spin{to{transform:rotate(360deg);}}
#badgeInfo{display:flex;flex-direction:column;gap:3px;flex:1;min-width:0;}
#badgeName{
  font-size:22px;font-weight:900;letter-spacing:-0.5px;
  color:var(--overlay-text,#fff);
  font-family:var(--overlay-font,'Inter'),sans-serif;
  line-height:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
#badgeMeta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:5px;}
#badgeGame{font-size:13px;font-weight:600;color:rgba(255,255,255,0.7);background:rgba(255,255,255,0.08);border-radius:20px;padding:3px 10px;display:none;}
#badgeFollowers{font-size:13px;font-weight:600;color:rgba(255,255,255,0.7);background:rgba(255,255,255,0.08);border-radius:20px;padding:3px 10px;display:none;}
#badgeTimer{font-size:16px;font-weight:800;color:var(--overlay-accent,#9147ff);background:rgba(145,71,255,0.12);border:1px solid rgba(145,71,255,0.3);border-radius:20px;padding:3px 12px;display:none;}

/* Barra progreso */
#progressBar{position:absolute;bottom:0;left:0;right:0;height:4px;background:rgba(0,0,0,0.3);z-index:10;}
#progressFill{height:100%;width:0%;transition:width linear;}

/* Confetti */
.confetti-wrap{position:absolute;inset:0;pointer-events:none;overflow:hidden;z-index:8;}
.c{position:absolute;width:7px;height:7px;border-radius:2px;animation:fall 2.5s ease-in forwards;top:-10px;}
@keyframes fall{0%{opacity:1;transform:translateY(0) rotate(0deg);}100%{opacity:0;transform:translateY(110vh) rotate(600deg);}}

/* ── MARCOS DECORATIVOS ── */
/* Marco decorativo via outline en el overlay */
#overlay.has-frame{outline-offset:8px;}

/* Animaciones de marcos */
@keyframes neonPulse{0%,100%{opacity:1;filter:drop-shadow(0 0 4px currentColor);}50%{opacity:0.7;filter:drop-shadow(0 0 12px currentColor);}}
@keyframes goldShine{0%{opacity:0.8;}50%{opacity:1;}100%{opacity:0.8;}}
@keyframes spiderWeb{0%{opacity:0.6;}50%{opacity:1;}100%{opacity:0.6;}}

/* Animaciones */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideIn{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes zoomIn{from{transform:scale(0.85);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes bounceIn{0%{transform:scale(0.3);opacity:0}60%{transform:scale(1.05)}80%{transform:scale(0.95)}100%{transform:scale(1);opacity:1}}
</style>
</head>
<body>

<div id="scene">
<div id="overlay">
  <div class="confetti-wrap" id="confetti"></div>
  <!-- Título arriba -->
  <div id="titleBar"><div id="soTitle"></div></div>
  <!-- Clip en el medio -->
  <div id="clipZone"></div>
  <!-- Info abajo -->
  <div id="infoPanel">
    <div id="badgeCard">
      <div id="badgeRow">
        <div id="avatarWrap">
          <img id="badgeAvatar" src="" alt="">
          <div id="avatarRing"></div>
        </div>
        <div id="badgeInfo">
          <div id="badgeName"></div>
          <div id="badgeMeta">
            <span id="badgeGame"></span>
            <span id="badgeFollowers"></span>
            <span id="badgeTimer"></span>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div id="progressBar"><div id="progressFill"></div></div>
</div>
</div>

<!-- Iframe dummy para warm-up -->
<iframe id="dummyIframe" src="" style="position:fixed;width:1px;height:1px;opacity:0.001;pointer-events:none;z-index:-1;" frameborder="0" allow="autoplay"></iframe>

<script>
const DOMAIN = window.location.hostname;
const channelName = window.location.pathname.split('/').pop().toLowerCase();
let hideTimeout = null;
let timerInterval = null;
let currentConfig = {};
let soQueue = []; // Cola de shoutouts pendientes
let soActive = false; // Si hay un shoutout en curso

// Warm-up dummy iframe
document.getElementById('dummyIframe').src =
  `https://clips.twitch.tv/embed?clip=AwkwardHelplessSalamanderSwiftRage&parent=${DOMAIN}&autoplay=false&muted=true`;

function applyCardLayout(config) {
  const style = config.style || {};
  const overlay = document.getElementById('overlay');
  const pad = 40;

  const sizes = {
    small:  { w: 400 },
    medium: { w: 600 },
    large:  { w: 800 },
  };
  const { w } = sizes[style.card_size || 'medium'];
  overlay.style.width = w + 'px';
  overlay.style.height = 'auto';
  // clipZone con aspect ratio 16:9
  const clipZone = document.getElementById('clipZone');
  if (clipZone) {
    clipZone.style.height = Math.round(w * 9 / 16) + 'px';
    clipZone.style.flex = 'none';
  }

  // Escalar textos
  const scale = w / 620;
  const nameEl = document.getElementById('badgeName');
  const titleEl = document.getElementById('soTitle');
  const avatarEl = document.getElementById('badgeAvatar');
  if (nameEl) nameEl.style.fontSize = Math.round(22 * scale) + 'px';
  if (titleEl) titleEl.style.fontSize = Math.round(17 * scale) + 'px';
  if (avatarEl) {
    avatarEl.style.width = Math.round(52 * scale) + 'px';
    avatarEl.style.height = Math.round(52 * scale) + 'px';
  }

  // Usar % del viewport para que funcione en cualquier resolución de OBS
  const padPct = 2.5; // ~40px en 1920 = 2.08%
  const posMap = {
    'top-left':      { top: padPct+'%',      left: padPct+'%',     right:'auto', bottom:'auto', transform:'' },
    'top-center':    { top: padPct+'%',      left: '50%',          right:'auto', bottom:'auto', transform:'translateX(-50%)' },
    'top-right':     { top: padPct+'%',      right: padPct+'%',    left:'auto',  bottom:'auto', transform:'' },
    'middle-left':   { top: '50%',           left: padPct+'%',     right:'auto', bottom:'auto', transform:'translateY(-50%)' },
    'center':        { top: '50%',           left: '50%',          right:'auto', bottom:'auto', transform:'translate(-50%,-50%)' },
    'middle-right':  { top: '50%',           right: padPct+'%',    left:'auto',  bottom:'auto', transform:'translateY(-50%)' },
    'bottom-left':   { bottom: padPct+'%',   left: padPct+'%',     right:'auto', top:'auto',    transform:'' },
    'bottom-center': { bottom: padPct+'%',   left: '50%',          right:'auto', top:'auto',    transform:'translateX(-50%)' },
    'bottom-right':  { bottom: padPct+'%',   right: padPct+'%',    left:'auto',  top:'auto',    transform:'' },
  };
  const pos = posMap[style.card_position || 'bottom-left'];
  overlay.style.top = pos.top || 'auto';
  overlay.style.left = pos.left || 'auto';
  overlay.style.right = pos.right || 'auto';
  overlay.style.bottom = pos.bottom || 'auto';
  overlay.style.transform = pos.transform || '';
}

function applyStyle(config) {
  applyCardLayout(config);
  const style = config.style || {};
  const accent = style.accent_color || '#9147ff';
  const textColor = style.text_color || '#ffffff';
  const font = style.font || 'Inter';

  document.documentElement.style.setProperty('--overlay-accent', accent);
  document.documentElement.style.setProperty('--overlay-text', textColor);
  document.documentElement.style.setProperty('--overlay-font', font);

  // Borde
  const overlay = document.getElementById('overlay');
  overlay.style.outline = 'none';
  overlay.style.borderImage = 'none';
  const bs = style.border_style || 'glow';

  // Resetear estilos especiales
  overlay.style.animation = overlay.classList.contains('show') ? overlay.style.animation : '';

  if (bs === 'none') {
    overlay.style.border = 'none';
    overlay.style.boxShadow = 'none';
    overlay.style.borderRadius = '16px';
  } else if (bs === 'solid') {
    // Borde grueso sólido sin glow
    overlay.style.border = `4px solid ${accent}`;
    overlay.style.boxShadow = 'none';
    overlay.style.borderRadius = '16px';
  } else if (bs === 'glow') {
    // Borde fino con glow exterior fuerte
    overlay.style.border = `2px solid ${accent}`;
    overlay.style.boxShadow = `0 0 8px ${accent}, 0 0 24px ${accent}88, 0 0 48px ${accent}44`;
    overlay.style.borderRadius = '16px';
  } else if (bs === 'neon') {
    // Neon: borde doble parpadeante con color fijo rosa
    overlay.style.border = '3px solid #e05a7a';
    overlay.style.boxShadow = '0 0 6px #e05a7a, 0 0 20px #e05a7aaa, inset 0 0 12px #e05a7a22';
    overlay.style.borderRadius = '4px';
  } else if (bs === 'gold') {
    // Gold: borde grueso dorado con brillo interior
    overlay.style.border = '3px solid #f0c060';
    overlay.style.boxShadow = '0 0 12px #f0c06088, 0 0 30px #f0c06044, inset 0 0 16px #f0c06022';
    overlay.style.borderRadius = '12px';
  }

  // Marco decorativo
  applyFrame(bs, accent);

  // Barra progreso
  document.getElementById('progressFill').style.background =
    `linear-gradient(90deg,${accent},${accent}99)`;

  // Cargar fuente si no es Inter
  if (font !== 'Inter') {
    const link = document.createElement('link');
    link.rel = 'stylesheet';
    link.href = `https://fonts.googleapis.com/css2?family=${encodeURIComponent(font)}:wght@400;700;800&display=swap`;
    document.head.appendChild(link);
  }
}

function applyFrame(frameStyle, accent) {
  const overlay = document.getElementById('overlay');
  if (!overlay) return;
  const c = accent || '#9147ff';

  // Limpiar marcos previos
  overlay.style.outline = '';
  overlay.style.outlineOffset = '';
  overlay.style.boxShadow = overlay.style.boxShadow?.replace(/,?[^,]*frame[^,]*/g, '') || '';
  overlay.classList.remove('has-frame');

  if (frameStyle === 'none' || !frameStyle) return;

  overlay.classList.add('has-frame');

  if (frameStyle === 'solid') {
    overlay.style.outline = `2px solid ${c}`;
    overlay.style.outlineOffset = '6px';
    return;
  }
  if (frameStyle === 'glow') {
    overlay.style.outline = `2px solid ${c}`;
    overlay.style.outlineOffset = '6px';
    overlay.style.filter = `drop-shadow(0 0 8px ${c})`;
    return;
  }
  if (frameStyle === 'neon') {
    overlay.style.outline = `2px solid #e05a7a`;
    overlay.style.outlineOffset = '6px';
    overlay.style.filter = `drop-shadow(0 0 12px #e05a7a) drop-shadow(0 0 4px #e05a7a)`;
    return;
  }
  if (frameStyle === 'gold') {
    overlay.style.outline = `3px solid #ffd700`;
    overlay.style.outlineOffset = '6px';
    overlay.style.filter = `drop-shadow(0 0 6px rgba(255,215,0,0.6))`;
    return;
  }

  // Para marcos SVG complejos (corners, gaming, medieval, spider) usar un pseudo-elemento via box-shadow + SVG background en ::after
  // Como no podemos usar ::after en JS, usamos un div absoluto que sigue al overlay
  // Crear/reusar el frameEl
  let frameEl = document.getElementById('frameOverlay');
  if (!frameEl) {
    frameEl = document.createElement('div');
    frameEl.id = 'frameOverlay';
    frameEl.style.cssText = 'position:absolute;pointer-events:none;z-index:50;overflow:visible;display:block;';
    overlay.parentNode.insertBefore(frameEl, overlay.nextSibling);
  }
  frameEl.innerHTML = '';
  frameEl.style.display = 'block';

  // Guardar referencia para sincronizar después del show
  window._pendingFrameSync = true;

  const c2 = accent || '#9147ff';

  if (frameStyle === 'corners') {
    // Solo esquinas decoradas
    frameEl.innerHTML = `<svg viewBox="0 0 100 100" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <g stroke="${c}" stroke-width="2.5" fill="none" opacity="0.9">
        <polyline points="2,14 2,2 14,2"/>
        <polyline points="86,2 98,2 98,14"/>
        <polyline points="2,86 2,98 14,98"/>
        <polyline points="86,98 98,98 98,86"/>
        <line x1="2" y1="2" x2="6" y2="6" stroke-width="1"/>
        <line x1="98" y1="2" x2="94" y2="6" stroke-width="1"/>
        <line x1="2" y1="98" x2="6" y2="94" stroke-width="1"/>
        <line x1="98" y1="98" x2="94" y2="94" stroke-width="1"/>
      </g>
    </svg>`;
  } else if (frameStyle === 'gold') {
    frameEl.innerHTML = `<svg viewBox="0 0 100 100" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#f0c060"/>
          <stop offset="30%" style="stop-color:#ffd700"/>
          <stop offset="60%" style="stop-color:#f0a800"/>
          <stop offset="100%" style="stop-color:#f0c060"/>
        </linearGradient>
      </defs>
      <rect x="1" y="1" width="98" height="98" rx="3" ry="3" stroke="url(#goldGrad)" stroke-width="2.5" fill="none"/>
      <rect x="3.5" y="3.5" width="93" height="93" rx="2" ry="2" stroke="url(#goldGrad)" stroke-width="0.8" fill="none" opacity="0.5"/>
      <!-- Ornamentos en esquinas -->
      <circle cx="4" cy="4" r="2" fill="#ffd700"/>
      <circle cx="96" cy="4" r="2" fill="#ffd700"/>
      <circle cx="4" cy="96" r="2" fill="#ffd700"/>
      <circle cx="96" cy="96" r="2" fill="#ffd700"/>
      <!-- Detalles laterales -->
      <line x1="20" y1="1.5" x2="80" y2="1.5" stroke="#ffd700" stroke-width="1" opacity="0.6"/>
      <line x1="20" y1="98.5" x2="80" y2="98.5" stroke="#ffd700" stroke-width="1" opacity="0.6"/>
    </svg>`;
    // goldShine via CSS
  } else if (frameStyle === 'neon') {
    frameEl.innerHTML = `<svg viewBox="0 0 100 100" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="1.5" y="1.5" width="97" height="97" rx="2" ry="2" stroke="#e05a7a" stroke-width="2" fill="none" filter="url(#neonBlur)"/>
      <rect x="1.5" y="1.5" width="97" height="97" rx="2" ry="2" stroke="#e05a7a" stroke-width="0.5" fill="none" opacity="0.5"/>
      <defs>
        <filter id="neonBlur"><feGaussianBlur stdDeviation="1.5" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      </defs>
    </svg>`;
    // neonPulse via CSS
  } else if (frameStyle === 'gaming') {
    // Estilo HUD con cortes en esquinas
    frameEl.innerHTML = `<svg viewBox="0 0 100 100" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <g stroke="${c}" fill="none">
        <!-- Marco principal con cortes en esquinas -->
        <polyline points="12,1.5 88,1.5 98.5,12 98.5,88 88,98.5 12,98.5 1.5,88 1.5,12 12,1.5" stroke-width="2"/>
        <!-- Detalles interiores en esquinas -->
        <polyline points="14,4 22,4 22,6" stroke-width="1" opacity="0.6"/>
        <polyline points="86,4 78,4 78,6" stroke-width="1" opacity="0.6"/>
        <polyline points="14,96 22,96 22,94" stroke-width="1" opacity="0.6"/>
        <polyline points="86,96 78,96 78,94" stroke-width="1" opacity="0.6"/>
        <!-- Marcas laterales -->
        <line x1="1.5" y1="40" x2="4" y2="40" stroke-width="1.5" opacity="0.7"/>
        <line x1="1.5" y1="50" x2="5" y2="50" stroke-width="2" opacity="0.9"/>
        <line x1="1.5" y1="60" x2="4" y2="60" stroke-width="1.5" opacity="0.7"/>
        <line x1="98.5" y1="40" x2="96" y2="40" stroke-width="1.5" opacity="0.7"/>
        <line x1="98.5" y1="50" x2="95" y2="50" stroke-width="2" opacity="0.9"/>
        <line x1="98.5" y1="60" x2="96" y2="60" stroke-width="1.5" opacity="0.7"/>
      </g>
    </svg>`;
  } else if (frameStyle === 'medieval') {
    frameEl.innerHTML = `<svg viewBox="0 0 100 100" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <g stroke="#8B6914" fill="none">
        <rect x="2" y="2" width="96" height="96" stroke-width="2.5"/>
        <rect x="4.5" y="4.5" width="91" height="91" stroke-width="0.8" opacity="0.5"/>
        <!-- Torres en esquinas -->
        <rect x="1" y="1" width="8" height="8" stroke-width="1.5" fill="none"/>
        <rect x="91" y="1" width="8" height="8" stroke-width="1.5" fill="none"/>
        <rect x="1" y="91" width="8" height="8" stroke-width="1.5" fill="none"/>
        <rect x="91" y="91" width="8" height="8" stroke-width="1.5" fill="none"/>
        <!-- Almenas -->
        <rect x="2" y="1" width="3" height="3" fill="#8B6914"/>
        <rect x="6" y="1" width="3" height="3" fill="#8B6914"/>
        <rect x="91" y="1" width="3" height="3" fill="#8B6914"/>
        <rect x="95" y="1" width="3" height="3" fill="#8B6914"/>
        <rect x="2" y="96" width="3" height="3" fill="#8B6914"/>
        <rect x="6" y="96" width="3" height="3" fill="#8B6914"/>
        <rect x="91" y="96" width="3" height="3" fill="#8B6914"/>
        <rect x="95" y="96" width="3" height="3" fill="#8B6914"/>
        <!-- Ornamento central superior -->
        <path d="M47,2 L50,5 L53,2" stroke-width="1.5" fill="none"/>
        <path d="M47,98 L50,95 L53,98" stroke-width="1.5" fill="none"/>
      </g>
    </svg>`;
  } else if (frameStyle === 'spider') {
    // Telarañas en las esquinas — temático Muffet
    frameEl.innerHTML = `<svg viewBox="0 0 100 100" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <g stroke="${c}" fill="none" opacity="0.85">
        <!-- Borde principal -->
        <rect x="1.5" y="1.5" width="97" height="97" rx="4" stroke-width="1.5"/>
        <!-- Telaraña esquina superior izquierda -->
        <line x1="2" y1="2" x2="20" y2="2" stroke-width="0.8" opacity="0.5"/>
        <line x1="2" y1="2" x2="2" y2="20" stroke-width="0.8" opacity="0.5"/>
        <line x1="2" y1="2" x2="20" y2="20" stroke-width="0.8" opacity="0.5"/>
        <path d="M2,8 Q8,8 8,2" stroke-width="0.7" opacity="0.6"/>
        <path d="M2,14 Q14,14 14,2" stroke-width="0.7" opacity="0.6"/>
        <path d="M2,20 Q20,20 20,2" stroke-width="0.7" opacity="0.6"/>
        <!-- Araña pequeña esquina SL -->
        <circle cx="5" cy="5" r="1.2" fill="${c}" opacity="0.8"/>
        <!-- Telaraña esquina superior derecha -->
        <line x1="98" y1="2" x2="80" y2="2" stroke-width="0.8" opacity="0.5"/>
        <line x1="98" y1="2" x2="98" y2="20" stroke-width="0.8" opacity="0.5"/>
        <line x1="98" y1="2" x2="80" y2="20" stroke-width="0.8" opacity="0.5"/>
        <path d="M98,8 Q92,8 92,2" stroke-width="0.7" opacity="0.6"/>
        <path d="M98,14 Q86,14 86,2" stroke-width="0.7" opacity="0.6"/>
        <path d="M98,20 Q80,20 80,2" stroke-width="0.7" opacity="0.6"/>
        <circle cx="95" cy="5" r="1.2" fill="${c}" opacity="0.8"/>
        <!-- Telaraña esquina inferior izquierda -->
        <line x1="2" y1="98" x2="20" y2="98" stroke-width="0.8" opacity="0.5"/>
        <line x1="2" y1="98" x2="2" y2="80" stroke-width="0.8" opacity="0.5"/>
        <line x1="2" y1="98" x2="20" y2="80" stroke-width="0.8" opacity="0.5"/>
        <path d="M2,92 Q8,92 8,98" stroke-width="0.7" opacity="0.6"/>
        <path d="M2,86 Q14,86 14,98" stroke-width="0.7" opacity="0.6"/>
        <path d="M2,80 Q20,80 20,98" stroke-width="0.7" opacity="0.6"/>
        <circle cx="5" cy="95" r="1.2" fill="${c}" opacity="0.8"/>
        <!-- Telaraña esquina inferior derecha -->
        <line x1="98" y1="98" x2="80" y2="98" stroke-width="0.8" opacity="0.5"/>
        <line x1="98" y1="98" x2="98" y2="80" stroke-width="0.8" opacity="0.5"/>
        <line x1="98" y1="98" x2="80" y2="80" stroke-width="0.8" opacity="0.5"/>
        <path d="M98,92 Q92,92 92,98" stroke-width="0.7" opacity="0.6"/>
        <path d="M98,86 Q86,86 86,98" stroke-width="0.7" opacity="0.6"/>
        <path d="M98,80 Q80,80 80,98" stroke-width="0.7" opacity="0.6"/>
        <circle cx="95" cy="95" r="1.2" fill="${c}" opacity="0.8"/>
      </g>
    </svg>`;
    // spiderWeb via CSS
  } else {
    if (frameEl) frameEl.style.display = 'none';
  }
}

function syncFrameOverlay() {
  const frameEl = document.getElementById('frameOverlay');
  const overlay = document.getElementById('overlay');
  if (!frameEl || !overlay || frameEl.style.display === 'none') return;

  // Calcular dimensiones reales del overlay
  const ow = parseInt(overlay.style.width) || overlay.offsetWidth;
  const clipZone = document.getElementById('clipZone');
  const titleBar = document.getElementById('titleBar');
  const infoPanel = document.getElementById('infoPanel');
  const clipH = clipZone ? clipZone.offsetHeight : 0;
  const titleH = titleBar && titleBar.style.display !== 'none' ? titleBar.offsetHeight : 0;
  const infoH = infoPanel ? infoPanel.offsetHeight : 0;
  const oh = clipH + titleH + infoH;

  if (ow === 0 || oh === 0) {
    setTimeout(syncFrameOverlay, 100);
    return;
  }

  // Posición del overlay en el scene
  const or = overlay.getBoundingClientRect();
  const sr = overlay.parentNode.getBoundingClientRect();
  const pad = 10;
  frameEl.style.left = (or.left - sr.left - pad) + 'px';
  frameEl.style.top = (or.top - sr.top - pad) + 'px';
  frameEl.style.width = (ow + pad * 2) + 'px';
  frameEl.style.height = (oh + pad * 2) + 'px';
  window._pendingFrameSync = false;
}

function applyAnimation(animType) {
  const overlay = document.getElementById('overlay');
  const anims = {
    fade: 'fadeIn 0.4s ease forwards',
    slide: 'slideIn 0.4s ease forwards',
    zoom: 'zoomIn 0.4s ease forwards',
    bounce: 'bounceIn 0.6s ease forwards',
  };
  overlay.style.animation = anims[animType] || anims.fade;
}

function spawnConfetti() {
  const colors = ['#9147ff','#b388ff','#f0c060','#40d090','#e05a7a','#58a6ff'];
  const wrap = document.getElementById('confetti');
  wrap.innerHTML = '';
  for (let i = 0; i < 30; i++) {
    const el = document.createElement('div');
    el.className = 'c';
    el.style.left = Math.random() * 100 + '%';
    el.style.background = colors[Math.floor(Math.random() * colors.length)];
    el.style.animationDelay = Math.random() * 1.5 + 's';
    el.style.animationDuration = (1.8 + Math.random() * 1.2) + 's';
    wrap.appendChild(el);
  }
}

async function fetchFollowers(username, appToken) {
  try {
    const res = await fetch(`/api/shoutout-followers/${username}`);
    const data = await res.json();
    return data.followers || null;
  } catch(e) { return null; }
}

function startTimer(duration) {
  if (timerInterval) clearInterval(timerInterval);
  let remaining = Math.floor(duration / 1000);
  const timerEl = document.getElementById('badgeTimer');
  timerEl.textContent = `${remaining}s`;
  timerInterval = setInterval(() => {
    remaining--;
    if (remaining <= 0) { clearInterval(timerInterval); timerEl.textContent = '0s'; }
    else timerEl.textContent = `${remaining}s`;
  }, 1000);
}

async function showShoutout(user, clip, mp4Url, config) {
  currentConfig = config || {};
  const style = currentConfig.style || {};
  const maxDurSec = currentConfig.max_duration || 60;
  const clipDur = clip ? Math.min(clip.duration, maxDurSec) : 10;
  const duration = Math.max((clipDur * 1000) + 2000, 8000); // mínimo 8s siempre

  applyStyle(currentConfig);

  // Título
  const titleBar = document.getElementById('titleBar');
  const titleEl = document.getElementById('soTitle');
  const titleText = style.title || '¡Sigan a {user}!';
  titleEl.textContent = titleText.replace('{user}', user.display_name || user.login);
  titleBar.style.display = 'block';

  // Avatar
  const avatarEl = document.getElementById('badgeAvatar');
  if (style.show_avatar !== false) {
    avatarEl.style.display = 'block';
    document.getElementById('avatarRing').style.display = 'block';
    fetch(`https://decapi.me/twitch/avatar/${user.login}`)
      .then(r => r.text())
      .then(url => { if (url?.startsWith('http')) avatarEl.src = url; })
      .catch(() => {});
  } else { avatarEl.style.display = 'none'; document.getElementById('avatarRing').style.display = 'none'; }

  // Nombre
  document.getElementById('badgeName').textContent = user.display_name || user.login;

  // Juego
  const gameEl = document.getElementById('badgeGame');
  if (style.show_game !== false && clip?.game_name) {
    gameEl.textContent = `🎮 ${clip.game_name}`;
    gameEl.style.display = 'inline';
  } else { gameEl.style.display = 'none'; }

  // Followers
  const followEl = document.getElementById('badgeFollowers');
  if (style.show_followers !== false) {
    followEl.style.display = 'inline';
    followEl.textContent = '👥 ...';
    fetch(`/api/shoutout-followers/${user.login}`)
      .then(r => r.json())
      .then(d => { if (d.followers !== null) followEl.textContent = `👥 ${d.followers?.toLocaleString()}`; })
      .catch(() => { followEl.style.display = 'none'; });
  } else { followEl.style.display = 'none'; }

  // Timer
  const timerEl = document.getElementById('badgeTimer');
  if (style.show_timer !== false) {
    timerEl.style.display = 'inline';
    startTimer(duration);
  } else { timerEl.style.display = 'none'; }

  // Clip dentro del clipZone
  const clipZone = document.getElementById('clipZone');
  clipZone.innerHTML = '';
  if (mp4Url) {
    const video = document.createElement('video');
    video.id = 'clipVideo';
    video.autoplay = true;
    video.setAttribute('playsinline','');
    video.src = mp4Url;
    video.volume = (currentConfig.volume ?? 100) / 100;
    // Respetar duración máxima
    if (currentConfig.max_duration) {
      video.addEventListener('timeupdate', function() {
        if (video.currentTime >= currentConfig.max_duration) {
          video.pause();
          setTimeout(hideOverlay, 1500);
        }
      }, { once: false });
    }
    video.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;object-fit:cover;';
    clipZone.appendChild(video);
    video.play().catch(e => console.log('video error:', e));
    video.onended = () => {
      if (hideTimeout) { clearTimeout(hideTimeout); hideTimeout = null; }
      setTimeout(hideOverlay, 1500);
    };
    video.onerror = () => {
      console.log('[so] Video error — forzando hideOverlay');
      if (hideTimeout) { clearTimeout(hideTimeout); hideTimeout = null; }
      setTimeout(hideOverlay, 1000);
    };
  } else if (clip) {
    const iframe = document.createElement('iframe');
    iframe.id = 'clipIframe';
    iframe.frameBorder = '0';
    iframe.setAttribute('allowfullscreen','');
    iframe.setAttribute('allow','autoplay; fullscreen');
    iframe.src = `https://clips.twitch.tv/embed?clip=${clip.id}&parent=${DOMAIN}&autoplay=true&muted=true`;
    iframe.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;border:none;';
    clipZone.appendChild(iframe);
  }

  // Mostrar overlay con animación
  const overlay = document.getElementById('overlay');
  overlay.style.setProperty('--overlay-opacity', (currentConfig.overlay_opacity ?? 100) / 100);
  overlay.classList.add('show');
  // Sincronizar el marco DESPUÉS de que el overlay sea visible
  setTimeout(syncFrameOverlay, 100);
  setTimeout(syncFrameOverlay, 300);
  setTimeout(syncFrameOverlay, 600);
  applyAnimation(style.animation || 'fade');

  spawnConfetti();

  // Barra progreso
  const fill = document.getElementById('progressFill');
  fill.style.transition = 'none';
  fill.style.width = '0%';
  setTimeout(() => {
    fill.style.transition = `width ${duration}ms linear`;
    fill.style.width = '100%';
  }, 100);

  if (hideTimeout) clearTimeout(hideTimeout);
  hideTimeout = setTimeout(hideOverlay, duration);
}

function hideOverlay() {
  if (!soActive && soQueue.length === 0) return; // ya oculto
  const overlay = document.getElementById('overlay');
  overlay.classList.remove('show');
  overlay.style.animation = '';
  overlay.style.removeProperty('--overlay-opacity');
  // Ocultar el marco también
  const frameElHide = document.getElementById('frameOverlay');
  if (frameElHide) frameElHide.style.display = 'none';
  const overlay2 = document.getElementById('overlay');
  if (overlay2) { overlay2.style.outline = ''; overlay2.style.outlineOffset = ''; overlay2.style.filter = ''; overlay2.classList.remove('has-frame'); }
  const clipZone = document.getElementById('clipZone');
  clipZone.innerHTML = '';
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
  const fill = document.getElementById('progressFill');
  fill.style.transition = 'none';
  fill.style.width = '0%';
  if (hideTimeout) { clearTimeout(hideTimeout); hideTimeout = null; }
  soActive = false;
  // Procesar siguiente en la cola
  setTimeout(processQueue, 800);
}

function processQueue() {
  if (soActive || soQueue.length === 0) return;
  const next = soQueue.shift();
  soActive = true;
  showShoutout(next.user, next.clip, next.mp4Url, next.config);
}

async function handleSo(targetUser) {
  try {
    const res = await fetch(`/api/shoutout-clips/${targetUser}?channel=${channelName}`);
    const data = await res.json();
    if (!data?.user) return;
    const config = { ...(data.config || {}), overlay_opacity: data.overlay_opacity ?? 100 };
    if (!soActive) {
      // No hay nada activo — mostrar directo
      soActive = true;
      showShoutout(data.user, data.clip, data.mp4Url, config);
    } else {
      // Hay uno activo — agregar a la cola
      soQueue.push({ user: data.user, clip: data.clip, mp4Url: data.mp4Url, config });
      console.log(`[so] En cola: ${data.user.display_name || data.user.login} (posición ${soQueue.length})`);
    }
  } catch(e) { console.error('[!so]', e); }
}

// IRC WebSocket — usa el comando configurado
function connectIRC() {
  const ws = new WebSocket('wss://irc-ws.chat.twitch.tv:443');
  ws.onopen = () => {
    ws.send('CAP REQ :twitch.tv/membership twitch.tv/tags twitch.tv/commands');
    ws.send(`NICK justinfan${Math.floor(Math.random() * 99999)}`);
    ws.send(`JOIN #${channelName}`);
  };
  ws.onmessage = (e) => {
    const msg = e.data;
    if (msg.startsWith('PING')) { ws.send('PONG :tmi.twitch.tv'); return; }

    // Detectar raid automático
    if (msg.includes('USERNOTICE') && msg.includes('msg-id=raid')) {
      const viewersMatch = msg.match(/msg-param-viewerCount=(\d+)/);
      const raidUser = msg.match(/msg-param-login=(\w+)/);
      const config = currentConfig?.trigger || {};
      if (config.raid_enabled && raidUser) {
        const viewers = parseInt(viewersMatch?.[1] || 0);
        if (viewers >= (config.raid_min_viewers || 0)) {
          setTimeout(() => handleSo(raidUser[1]), (config.raid_delay || 5) * 1000);
        }
      }
      return;
    }

    if (!msg.includes('PRIVMSG')) return;
    const badgesMatch = msg.match(/badges=([^;]*)/);
    const badges = badgesMatch ? badgesMatch[1] : '';

    // Verificar permisos configurados
    const perms = currentConfig?.trigger?.perms || ['mods','broadcaster'];
    const isMod = badges.includes('moderator');
    const isBroadcaster = badges.includes('broadcaster');
    const isVip = badges.includes('vip');
    const isSub = badges.includes('subscriber');
    const allowed = (perms.includes('mods') && isMod) || (perms.includes('broadcaster') && isBroadcaster) ||
      (perms.includes('vips') && isVip) || (perms.includes('subs') && isSub);
    if (!allowed) return;

    const msgMatch = msg.match(/PRIVMSG #\w+ :(.+)/);
    if (!msgMatch) return;
    const text = msgMatch[1].trim().toLowerCase();

    // Usar comando configurado
    const cmd = (currentConfig?.trigger?.command || '!so').toLowerCase();
    if (text.startsWith(cmd + ' ') || text === cmd) {
      const target = text.slice(cmd.length).replace('@','').trim();
      if (target) handleSo(target);
    }
  };
  ws.onclose = () => setTimeout(connectIRC, 5000);
  ws.onerror = () => ws.close();
}

// Cargar config inicial
async function init() {
  try {
    const res = await fetch(`/api/shoutout-config-public/${channelName}`);
    if (res.ok) {
      const data = await res.json();
      currentConfig = data.config || {};
      applyStyle(currentConfig);
    }
  } catch(e) {}
  connectIRC();
}

init();
