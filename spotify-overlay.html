<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spotify Overlay</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: transparent;
  font-family: 'Inter', sans-serif;
  display: flex;
  align-items: flex-end;
  justify-content: flex-start;
  min-height: 100vh;
  padding: 20px;
}

.widget {
  display: flex;
  align-items: center;
  gap: 12px;
  background: rgba(0, 0, 0, 0.75);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(255, 255, 255, 0.08);
  border-radius: 16px;
  padding: 12px 16px 12px 12px;
  min-width: 280px;
  max-width: 360px;
  opacity: 0;
  transform: translateY(20px);
  transition: opacity 0.5s ease, transform 0.5s ease;
  position: relative;
  overflow: hidden;
}

.widget.visible {
  opacity: 1;
  transform: translateY(0);
}

.widget.hidden {
  opacity: 0;
  transform: translateY(20px);
}

/* Glow verde de fondo */
.widget::before {
  content: '';
  position: absolute;
  top: -30px;
  left: -30px;
  width: 120px;
  height: 120px;
  background: radial-gradient(circle, rgba(30, 215, 96, 0.15), transparent 70%);
  pointer-events: none;
  transition: opacity 0.5s;
}

/* Línea verde arriba */
.widget::after {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 2px;
  background: linear-gradient(90deg, #1ed760, rgba(30, 215, 96, 0.3), transparent);
  border-radius: 16px 16px 0 0;
}

/* Portada */
.album-art-wrap {
  position: relative;
  flex-shrink: 0;
}

.album-art {
  width: 56px;
  height: 56px;
  border-radius: 10px;
  object-fit: cover;
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
  transition: opacity 0.4s ease;
  background: #1a1a1a;
}

.album-art.fade {
  opacity: 0;
}

/* Icono de Spotify en la portada */
.spotify-badge {
  position: absolute;
  bottom: -4px;
  right: -4px;
  width: 18px;
  height: 18px;
  background: #1ed760;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 2px solid rgba(0,0,0,0.8);
}

/* Info */
.info {
  flex: 1;
  min-width: 0;
}

.label {
  font-size: 9px;
  font-weight: 600;
  color: #1ed760;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  margin-bottom: 4px;
  display: flex;
  align-items: center;
  gap: 5px;
}

.label-dot {
  width: 5px;
  height: 5px;
  background: #1ed760;
  border-radius: 50%;
  animation: blink 1.5s ease infinite;
}

@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

.track-name {
  font-size: 14px;
  font-weight: 700;
  color: #ffffff;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  line-height: 1.2;
  margin-bottom: 3px;
  transition: opacity 0.3s;
}

.artist-name {
  font-size: 11px;
  font-weight: 400;
  color: rgba(255, 255, 255, 0.55);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-bottom: 8px;
  transition: opacity 0.3s;
}

/* Barra de progreso */
.progress-wrap {
  height: 3px;
  background: rgba(255, 255, 255, 0.12);
  border-radius: 2px;
  overflow: hidden;
}

.progress-bar {
  height: 100%;
  background: #1ed760;
  border-radius: 2px;
  transition: width 1s linear;
  box-shadow: 0 0 6px rgba(30, 215, 96, 0.6);
}

/* Animación de texto entrante */
@keyframes slideIn {
  from { opacity: 0; transform: translateX(-8px); }
  to   { opacity: 1; transform: translateX(0); }
}

.track-name.animate, .artist-name.animate {
  animation: slideIn 0.4s ease forwards;
}

/* Paused state */
.widget.paused .label-dot { animation: none; opacity: 0.3; }
.widget.paused .progress-bar { box-shadow: none; }
</style>
</head>
<body>

<div class="widget" id="widget">
  <div class="album-art-wrap">
    <img class="album-art" id="albumArt" src="" alt="Album Art">
    <div class="spotify-badge">
      <svg width="10" height="10" viewBox="0 0 24 24" fill="black">
        <path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/>
      </svg>
    </div>
  </div>

  <div class="info">
    <div class="label">
      <span class="label-dot" id="labelDot"></span>
      Sonando ahora
    </div>
    <div class="track-name" id="trackName">—</div>
    <div class="artist-name" id="artistName">—</div>
    <div class="progress-wrap">
      <div class="progress-bar" id="progressBar" style="width:0%"></div>
    </div>
  </div>
</div>

<script>
const username = window.location.pathname.split('/overlay/spotify/')[1];
let currentTrack = '';
let progressInterval = null;

async function fetchStatus() {
  try {
    const res = await fetch(`/api/overlay/spotify/${username}`);
    const data = await res.json();
    updateWidget(data);
  } catch(e) {}
}

function updateWidget(data) {
  const widget = document.getElementById('widget');
  const trackEl = document.getElementById('trackName');
  const artistEl = document.getElementById('artistName');
  const artEl = document.getElementById('albumArt');
  const progressEl = document.getElementById('progressBar');

  if (!data.playing) {
    widget.classList.remove('visible');
    widget.classList.add('hidden');
    clearInterval(progressInterval);
    return;
  }

  widget.classList.remove('hidden');
  widget.classList.add('visible');
  widget.style.opacity = (data.overlay_opacity ?? 100) / 100;

  if (data.is_playing) {
    widget.classList.remove('paused');
  } else {
    widget.classList.add('paused');
  }

  // Si cambió la canción
  if (data.track !== currentTrack) {
    currentTrack = data.track;

    // Fade out portada y animar texto
    artEl.classList.add('fade');
    setTimeout(() => {
      artEl.src = data.image || '';
      artEl.onload = () => artEl.classList.remove('fade');
      artEl.onerror = () => artEl.classList.remove('fade');
    }, 400);

    // Animar texto
    trackEl.classList.remove('animate');
    artistEl.classList.remove('animate');
    void trackEl.offsetWidth;
    trackEl.textContent = data.track;
    artistEl.textContent = data.artist;
    trackEl.classList.add('animate');
    artistEl.classList.add('animate');
  }

  // Progreso
  clearInterval(progressInterval);
  let progress = data.progress_ms || 0;
  const duration = data.duration_ms || 1;

  function updateProgress() {
    const pct = Math.min((progress / duration) * 100, 100);
    progressEl.style.width = pct + '%';
    if (data.is_playing) progress += 1000;
  }

  updateProgress();
  if (data.is_playing) {
    progressInterval = setInterval(updateProgress, 1000);
  }
}

// Iniciar
fetchStatus();
setInterval(fetchStatus, 10000);
</script>
</body>
</html>
